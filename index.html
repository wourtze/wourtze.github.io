<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Хоккей</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#0a0a1a; overflow:hidden; touch-action:none; }
canvas { display:block; }

/* ======= МЕНЮ ======= */
#screen-menu {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:200; font-family:Arial,sans-serif;
  background: url('fondo1.png') center center / cover no-repeat;
}
#screen-menu::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.55) 0%,
    transparent 22%,
    transparent 78%,
    rgba(0,0,0,0.55) 100%
  );
  pointer-events:none; z-index:0;
}

/* Частицы/звёзды в меню */
#menu-particles {
  position:absolute; inset:0;
  pointer-events:none; z-index:0;
  overflow:hidden;
}
.mstar {
  position:absolute;
  width:6px; height:6px;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  animation: mstarFloat linear infinite;
}
@keyframes mstarFloat {
  0%   { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:1; }
  100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity:0; }
}

#menu-content {
  position:relative; z-index:1;
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
}

#elo-label {
  position:absolute; top:1.5vw; left:1.5vw;
  color:#fff; font-size:3vw; font-weight:bold;
  text-shadow:1px 1px 3px #000;
  line-height:1.5;
}
#elo-label .elo-val { color:#fff; }
#elo-label .nik-val { color:#ffdd00; font-size:2.5vw; }

#left-btns {
  position:absolute; left:1.5vw; top:50%;
  transform:translateY(-50%);
  display:flex; flex-direction:column; gap:1.2vw;
}
.left-btn {
  background:rgba(40,40,40,0.92);
  color:#fff; border:none;
  border-radius:1.2vw;
  padding:1.3vw 3.5vw;
  font-size:3vw; font-weight:bold;
  cursor:pointer;
  box-shadow:0 0.3vw 1.2vw rgba(0,0,0,0.5);
  text-align:center; min-width:16vw;
  transition: transform 0.1s, background 0.15s;
}
.left-btn:active { filter:brightness(0.8); transform:scale(0.96); }

#right-btns {
  position:absolute; right:1.5vw; top:50%;
  transform:translateY(-50%);
  display:flex; flex-direction:column; gap:1.2vw;
}
.right-btn {
  border:none; border-radius:1.2vw;
  padding:1.3vw 2.5vw;
  font-size:2.8vw; font-weight:bold;
  cursor:pointer;
  box-shadow:0 0.3vw 1.2vw rgba(0,0,0,0.5);
  min-width:18vw; text-align:center;
  transition: transform 0.1s, filter 0.1s;
}
.right-btn:active { filter:brightness(0.8); transform:scale(0.96); }
.btn-settings { background:rgba(50,50,50,0.93); color:#fff; }
.btn-code     { background:#cc2222; color:#fff; }

#nick-plate {
  position:absolute; top:2vw; left:50%; transform:translateX(-50%);
  background:rgba(180,180,180,0.92);
  border:0.5vw solid #aaa; border-radius:1.5vw;
  padding:1vw 5vw;
  font-size:4vw; font-weight:bold;
  color:#222;
  box-shadow:0 0.3vw 1.5vw rgba(0,0,0,0.4);
  white-space:nowrap;
  display:flex; align-items:center; gap:1vw;
  cursor:pointer;
  transition: background 0.15s;
}
#nick-plate:active { background:rgba(200,200,200,0.98); }
#nick-plate::before { content:'▼'; font-size:2.5vw; color:#555; }

#char-prev, #char-next {
  position:absolute; top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.35); border:none;
  color:#fff; font-size:6vw;
  cursor:pointer; z-index:2;
  padding:1vw 1.5vw;
  border-radius:1vw;
  text-shadow:0 0 4px rgba(0,0,0,0.6);
  transition: background 0.15s;
}
#char-prev:active, #char-next:active { background:rgba(0,0,0,0.6); }
#char-prev { left:22vw; }
#char-next { right:22vw; }

#char-wrap {
  position:relative;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:2vw;
}
#char-img {
  width:28vw; max-width:220px;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.35));
  animation: charBob 2s ease-in-out infinite;
}
@keyframes charBob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-4%); }
}

#btn-bot {
  background:#f5d800; color:#222;
  border:none; border-radius:3vw;
  padding:2vw 7vw;
  font-size:4vw; font-weight:bold;
  cursor:pointer;
  box-shadow:0 0.5vw 2vw rgba(0,0,0,0.3);
  transition: transform 0.1s, box-shadow 0.1s;
}
#btn-bot:active { filter:brightness(0.88); transform:scale(0.95); }

/* ======= МОДАЛКИ ======= */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.75);
  z-index:500;
  display:none;
  align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:#1a1a2e;
  border:2px solid rgba(255,255,255,0.15);
  border-radius:3vw;
  padding:4vw 5vw;
  min-width:55vw; max-width:85vw;
  color:#fff;
  font-family:Arial,sans-serif;
  position:relative;
  animation: modalPop 0.2s ease;
}
@keyframes modalPop {
  from { transform:scale(0.85); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}
.modal-title {
  font-size:4.5vw; font-weight:bold;
  margin-bottom:3vw; text-align:center;
  color:#ffdd00;
}
.modal-close {
  position:absolute; top:2vw; right:3vw;
  background:none; border:none;
  color:#aaa; font-size:5vw; cursor:pointer;
}
.modal-row {
  display:flex; align-items:center;
  gap:2vw; margin-bottom:2vw;
  font-size:3vw;
}
.modal-row label { flex:1; color:#ccc; }
.modal-row input, .modal-row select {
  flex:1.5;
  background:#2a2a40; color:#fff;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:1vw; padding:1vw 2vw;
  font-size:3vw;
}
.modal-btn {
  background:#2255cc; color:#fff;
  border:none; border-radius:2vw;
  padding:1.5vw 4vw; font-size:3.2vw;
  cursor:pointer; margin-top:2vw;
  width:100%; font-weight:bold;
  transition: filter 0.1s;
}
.modal-btn:active { filter:brightness(0.85); }

/* Топы */
.top-row {
  display:flex; align-items:center;
  gap:2vw; padding:1.5vw 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:2.8vw;
}
.top-rank { font-size:3.5vw; min-width:6vw; text-align:center; }
.top-nick { flex:1; font-weight:bold; }
.top-elo  { color:#ffdd00; font-weight:bold; }

/* ======= WIN ======= */
#screen-win {
  position:fixed; inset:0;
  background:rgba(5,10,30,0.96);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:300; font-family:Arial,sans-serif;
}
@keyframes springIn {
  0%   { transform: scale(0) rotate(-18deg); opacity:0; }
  45%  { transform: scale(1.35) rotate(6deg); opacity:1; }
  65%  { transform: scale(0.88) rotate(-4deg); }
  80%  { transform: scale(1.12) rotate(2deg); }
  90%  { transform: scale(0.96) rotate(-1deg); }
  100% { transform: scale(1) rotate(0deg); }
}
#win-img {
  max-width:80vw; max-height:50vh; object-fit:contain; margin-bottom:3vw;
  transform-origin: center center;
}
#win-img.spring { animation: springIn 0.75s cubic-bezier(0.34,1.56,0.64,1) forwards; }
#win-text { display:none; }
.btn {
  background:linear-gradient(135deg,#2255cc,#1133aa);
  color:#fff; border:none; border-radius:3vw;
  padding:2vw 8vw; font-size:4vw; cursor:pointer;
  margin:1.5vw; box-shadow:0 0.5vw 3vw rgba(0,100,255,0.5);
  transition: filter 0.1s;
}
.btn:active { filter:brightness(0.85); }

/* Анимация звезды (гол) */
@keyframes starPulse {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.8); }
  70%  { transform: scale(0.9); }
  100% { transform: scale(1); }
}
.star-pulse { animation: starPulse 0.45s ease; }
</style>
</head>
<body>

<!-- Меню -->
<div id="screen-menu">
  <div id="menu-particles"></div>
  <div id="menu-content">

    <div id="elo-label">
      <div class="elo-val">Elo: <span id="elo-num">1640</span></div>
      <div class="nik-val">Ник: <span id="nik-display">лозер</span></div>
    </div>

    <div id="left-btns">
      <button class="left-btn" onclick="openModal('modal-nick')">Ник</button>
      <button class="left-btn" onclick="openModal('modal-profile')">Профиль</button>
      <button class="left-btn" onclick="openModal('modal-tops')">ТОПЫ</button>
    </div>

    <div id="right-btns">
      <button class="right-btn btn-settings" onclick="openModal('modal-settings')">Настройки</button>
      <button class="right-btn btn-code"     onclick="openModal('modal-code')">Код автора</button>
    </div>

    <div id="nick-plate" onclick="openModal('modal-nick')"><span id="nick-plate-name">Гоня</span></div>

    <button id="char-prev" onclick="prevChar()">◀</button>
    <button id="char-next" onclick="nextChar()">▶</button>

    <div id="char-wrap">
      <img id="char-img" src="haha.png" alt="Персонаж">
      <button id="btn-bot" onclick="startGame()">С ботом (Elo)</button>
    </div>

  </div>
</div>

<!-- МОДАЛКА: Ник -->
<div class="modal-overlay" id="modal-nick">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-nick')">✕</button>
    <div class="modal-title">Изменить ник</div>
    <div class="modal-row">
      <label>Новый ник:</label>
      <input type="text" id="input-nick" placeholder="Введи ник" maxlength="16">
    </div>
    <button class="modal-btn" onclick="saveNick()">💾 Сохранить</button>
  </div>
</div>

<!-- МОДАЛКА: Профиль -->
<div class="modal-overlay" id="modal-profile">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-profile')">✕</button>
    <div class="modal-title">Профиль</div>
    <div class="modal-row"><label>Ник:</label><span id="prof-nick">лозер</span></div>
    <div class="modal-row"><label>Elo:</label><span id="prof-elo">1640</span></div>
    <div class="modal-row"><label>Побед:</label><span id="prof-wins">0</span></div>
    <div class="modal-row"><label>Поражений:</label><span id="prof-losses">0</span></div>
    <div class="modal-row"><label>Голов забито:</label><span id="prof-goals">0</span></div>
  </div>
</div>

<!-- МОДАЛКА: Топы -->
<div class="modal-overlay" id="modal-tops">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-tops')">✕</button>
    <div class="modal-title">🏆 Топ игроков</div>
    <div id="tops-list"></div>
  </div>
</div>

<!-- МОДАЛКА: Настройки -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-settings')">✕</button>
    <div class="modal-title">⚙️ Настройки</div>
    <div class="modal-row">
      <label>Очки для победы:</label>
      <select id="sel-score">
        <option value="3">3</option>
        <option value="5" selected>5</option>
        <option value="7">7</option>
        <option value="10">10</option>
      </select>
    </div>
    <div class="modal-row">
      <label>Сложность ИИ:</label>
      <select id="sel-diff">
        <option value="easy">Лёгкий</option>
        <option value="medium" selected>Средний</option>
        <option value="hard">Сложный</option>
      </select>
    </div>
    <button class="modal-btn" onclick="saveSettings()">💾 Сохранить</button>
  </div>
</div>

<!-- МОДАЛКА: Код автора -->
<div class="modal-overlay" id="modal-code">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-code')">✕</button>
    <div class="modal-title">👨‍💻 Код автора</div>
    <div style="text-align:center; font-size:3.5vw; line-height:2;">
      <div>Разработчик: <b style="color:#ffdd00">Гоня</b></div>
      <div style="color:#aaa; font-size:2.8vw; margin-top:2vw;">Хоккей v2.0</div>
      <div style="color:#aaa; font-size:2.5vw;">2025</div>
    </div>
  </div>
</div>

<!-- ПОБЕДА -->
<div id="screen-win">
  <img id="win-img" src="" alt="winner">
  <div id="win-text"></div>
  <button class="btn" onclick="restartGame()">🔄 Ещё раз</button>
  <button class="btn" onclick="goMenu()">🏠 Меню</button>
</div>

<canvas id="c"></canvas>

<script>
// ===== МЕНЮШНЫЕ ФУНКЦИИ =====

function openModal(id) {
  if (id === 'modal-tops') buildTops();
  if (id === 'modal-profile') updateProfileModal();
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

let playerNick = localStorage.getItem('nick') || 'лозер';
let playerElo  = parseInt(localStorage.getItem('elo') || '1640');
let statsWins  = parseInt(localStorage.getItem('wins') || '0');
let statsLosses= parseInt(localStorage.getItem('losses') || '0');
let statsGoals = parseInt(localStorage.getItem('goals') || '0');

function updateNickUI() {
  document.getElementById('nik-display').textContent = playerNick;
  document.getElementById('nick-plate-name').textContent = playerNick;
  document.getElementById('elo-num').textContent = playerElo;
}
updateNickUI();

function saveNick() {
  const v = document.getElementById('input-nick').value.trim();
  if (!v) return;
  playerNick = v;
  localStorage.setItem('nick', playerNick);
  updateNickUI();
  closeModal('modal-nick');
}

function updateProfileModal() {
  document.getElementById('prof-nick').textContent = playerNick;
  document.getElementById('prof-elo').textContent = playerElo;
  document.getElementById('prof-wins').textContent = statsWins;
  document.getElementById('prof-losses').textContent = statsLosses;
  document.getElementById('prof-goals').textContent = statsGoals;
}

const fakeLeaders = [
  {nick:'ПроХоккей',elo:2140},{nick:'IceKing',elo:1980},{nick:'ГолМашина',elo:1870},
  {nick:'ФастПак',elo:1780},{nick:'СинийВихрь',elo:1720}
];
function buildTops() {
  const players = [...fakeLeaders, {nick:playerNick, elo:playerElo}]
    .sort((a,b)=>b.elo-a.elo).slice(0,10);
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('tops-list').innerHTML = players.map((p,i)=>`
    <div class="top-row">
      <div class="top-rank">${medals[i]||'#'+(i+1)}</div>
      <div class="top-nick" style="${p.nick===playerNick?'color:#ffdd00':''}">${p.nick}</div>
      <div class="top-elo">${p.elo}</div>
    </div>`).join('');
}

let scoreLimit = 5;
let aiDiff = 'medium';
function saveSettings() {
  scoreLimit = parseInt(document.getElementById('sel-score').value);
  aiDiff = document.getElementById('sel-diff').value;
  closeModal('modal-settings');
}

// ===== ЗВЁЗДЫ В МЕНЮ =====
(function spawnMenuStars(){
  const container = document.getElementById('menu-particles');
  const colors = ['#ffdd00','#ff8844','#44aaff','#ff4488','#88ffaa','#ffffff'];
  for(let i=0;i<22;i++){
    const s=document.createElement('div');
    s.className='mstar';
    const size=4+Math.random()*10;
    s.style.cssText=`
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${4+Math.random()*8}s;
      animation-delay:${-Math.random()*10}s;
      opacity:${0.5+Math.random()*0.5};
    `;
    container.appendChild(s);
  }
})();

// Смена персонажа
const chars = ['haha.png','kompot.png'];
let charIdx = 0;
function prevChar(){ charIdx=(charIdx-1+chars.length)%chars.length; document.getElementById('char-img').src=chars[charIdx]; }
function nextChar(){ charIdx=(charIdx+1)%chars.length; document.getElementById('char-img').src=chars[charIdx]; }

// ===== CANVAS =====
const c=document.getElementById('c');
const ctx=c.getContext('2d');
let W,H,sx,sy,dpr=1;
const BW=800,BH=480;

function resize(){
  W=window.innerWidth; H=window.innerHeight;
  dpr=window.devicePixelRatio||1;
  c.width=W*dpr; c.height=H*dpr;
  c.style.width=W+'px'; c.style.height=H+'px';
  sx=W*dpr/BW; sy=H*dpr/BH;
}
window.addEventListener('resize',resize);
resize();

function img(src){const i=new Image();i.src=src;return i;}

// ===== ЗВУКИ УДАРА ПО ШАЙБЕ =====
const hitSounds = [
  new Audio('hit1.mp3'),
  new Audio('hit2.mp3'),
  new Audio('hit3.mp3'),
  new Audio('hit4.mp3')
];
hitSounds.forEach(s=>{ s.preload='auto'; s.volume=0.7; });

let _lastHitTime = 0;
function playHit(){
  const now = Date.now();
  if(now - _lastHitTime < 80) return;
  _lastHitTime = now;
  const s = hitSounds[Math.floor(Math.random()*4)];
  s.currentTime = 0;
  s.play().catch(()=>{});
}
const iRink=img('karta.png');
const iRed=img('haha.png');
const iBlue=img('kompot.png');
const iW1=img('winner1.png');
const iW2=img('winner2.png');

let sRed=0,sBlue=0;
let running=false;

// ===== БАГ 2: ПРАВИЛЬНЫЕ ХИТБОКСЫ ВОРОТ =====
// По фото: карта ~800x480, борта ~7% с каждой стороны
// Ворота по центру по вертикали, высота ~22% поля (~105px)
// Ворота НА САМОМ КРАЮ — x=RINK.x и x=RINK.x+RINK.w
// Хитбоксы откалиброваны точнее по карте (борты ~8.5% по X, ~9% по Y)
const RINK={x:68,y:43,w:664,h:394};
const GH = Math.round(RINK.h * 0.24); // ~95px — высота ворот
const GY  = RINK.y + RINK.h/2 - GH/2;

// Увеличенные размеры персонажей и шайбы
const PR=36, PKTR=18;
const SPMAX=7;
const FRIC=0.87;

let red={},blue={},puck={};
let redDrag=null,blueDrag=null;

// Анимация звёздочек при голе
const starAnims = []; // {x,y,vx,vy,r,color,life,maxLife}

function resetPos(){
  red ={x:RINK.x+RINK.w*0.22, y:BH/2, vx:0, vy:0, r:PR};
  blue={x:RINK.x+RINK.w*0.78, y:BH/2, vx:0, vy:0, r:PR};
  puck={x:BW/2, y:BH/2, vx:(Math.random()-0.5)*2.5, vy:(Math.random()-0.5)*2.5, r:PKTR};
}

function startGame(){
  document.getElementById('screen-menu').style.display='none';
  sRed=0;sBlue=0;dragPointerId=null;
  starAnims.length=0;
  resetPos();running=true;loop();
}
function restartGame(){
  document.getElementById('screen-win').style.display='none';
  startGame();
}
function goMenu(){
  document.getElementById('screen-win').style.display='none';
  document.getElementById('screen-menu').style.display='flex';
  running=false;
}

// ===== УПРАВЛЕНИЕ — POINTER EVENTS (не теряют палец при быстром движении) =====
function tb(cx,cy){return{x:cx*BW/W,y:cy*BH/H};}
function dst2(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}

const GRAB_R = PR * 1.8;
const CENTER_X = BW / 2; // красная линия — игрок не может её пересечь

// pointerId нашего пальца
let dragPointerId = null;
let dragOX=0, dragOY=0;

c.style.touchAction='none'; // нужно для pointer events на canvas

document.addEventListener('pointerdown', e=>{
  if(!running) return;
  const p=tb(e.clientX, e.clientY);
  if(dragPointerId===null && dst2(p.x,p.y,red.x,red.y)<=GRAB_R){
    dragPointerId=e.pointerId;
    dragOX=p.x-red.x;
    dragOY=p.y-red.y;
    // захватываем указатель — браузер гарантирует все события этого пальца нам
    try{ e.target.setPointerCapture(e.pointerId); }catch(ex){}
  }
});

document.addEventListener('pointermove', e=>{
  if(!running || dragPointerId===null || e.pointerId!==dragPointerId) return;
  const p=tb(e.clientX, e.clientY);
  const nx=p.x-dragOX;
  const ny=p.y-dragOY;
  // Скорость = дельта (для физики удара по шайбе)
  red.vx=nx-red.x;
  red.vy=ny-red.y;
  red.x=nx;
  red.y=ny;
});

document.addEventListener('pointerup', e=>{
  if(e.pointerId===dragPointerId){
    dragPointerId=null;
    red.vx*=0.4; red.vy*=0.4;
  }
});
document.addEventListener('pointercancel', e=>{
  if(e.pointerId===dragPointerId) dragPointerId=null;
});

// ===== ИИ =====
let aiState='defend';
let aiNoiseTick=0;
let aiNoiseX=0,aiNoiseY=0;
let aiPerceivedPuckX=BW/2,aiPerceivedPuckY=BH/2;
let aiReactionTimer=0;
let aiAimY=BH/2;
let aiPhase='position'; // position | charge

function aiParams(){
  if(aiDiff==='easy') return {spd:3.5, noise:30, react:18};
  if(aiDiff==='hard') return {spd:6.0, noise:4,  react:3};
  return                     {spd:4.5, noise:16, react:10};
}

function updateAI(){
  const p=aiParams();
  aiNoiseTick++;

  if(aiNoiseTick%25===0){
    aiNoiseX=(Math.random()-0.5)*p.noise*2;
    aiNoiseY=(Math.random()-0.5)*p.noise*2;
  }
  aiReactionTimer++;
  if(aiReactionTimer>=p.react){
    aiReactionTimer=0;
    aiPerceivedPuckX=puck.x+aiNoiseX;
    aiPerceivedPuckY=puck.y+aiNoiseY;
  }

  const px=aiPerceivedPuckX, py=aiPerceivedPuckY;
  const gCY=RINK.y+RINK.h/2;
  const threat=(px>BW*0.45)||(puck.vx>1.5&&px>BW*0.32);

  let tx,ty;

  if(threat){
    // ЗАЩИТА: летим к шайбе чтобы выбить её
    aiState='defend'; aiPhase='charge';
    tx=px; ty=py;
    // Если шайба летит прямо в ворота — встаём на пути
    if(puck.vx>2){
      tx=RINK.x+RINK.w-blue.r*2;
      ty=Math.max(GY+blue.r+4, Math.min(GY+GH-blue.r-4, py));
    }
  } else {
    aiState='attack';
    const distToPuck=dst2(blue.x,blue.y,px,py);

    if(aiPhase==='position' || distToPuck>blue.r+puck.r+55){
      // Фаза позиционирования: заходим СТРОГО позади шайбы (со стороны правых ворот)
      aiPhase='position';
      // Фиксируем прицел в левые ворота
      if(distToPuck>blue.r+puck.r+80)
        aiAimY=gCY+(Math.random()-0.5)*GH*0.55;
      // Вектор от шайбы к левым воротам
      const toGoalVX=RINK.x-px, toGoalVY=aiAimY-py;
      const toGoalL=Math.hypot(toGoalVX,toGoalVY)||1;
      // Встаём ПРОТИВОПОЛОЖНО — то есть справа от шайбы
      tx=px-(toGoalVX/toGoalL)*(blue.r+puck.r+18);
      ty=py-(toGoalVY/toGoalL)*(blue.r+puck.r+18);
      // Встали позади — пора бить
      if(distToPuck<blue.r+puck.r+52) aiPhase='charge';
    } else {
      // Фаза удара: летим СКВОЗЬ шайбу — цель на 30px дальше шайбы в сторону левых ворот
      aiPhase='charge';
      const toGoalVX=RINK.x-px, toGoalVY=aiAimY-py;
      const toGoalL=Math.hypot(toGoalVX,toGoalVY)||1;

      // Шайба у нижней стены — заходим сверху чтобы вытолкнуть вниз-влево
      const nearBottom=(py>RINK.y+RINK.h-puck.r*3.5);
      const nearTop=(py<RINK.y+puck.r*3.5);
      const nearRightWall=(px>RINK.x+RINK.w-puck.r*3.5);

      if(nearBottom){
        // Заходим сверху шайбы
        tx=px; ty=py-(blue.r+puck.r+10);
      } else if(nearTop){
        // Заходим снизу шайбы
        tx=px; ty=py+(blue.r+puck.r+10);
      } else if(nearRightWall){
        // Заходим справа и толкаем влево
        tx=px+(blue.r+puck.r+10); ty=py;
      } else {
        // Нормальный удар сквозь шайбу
        tx=px+(toGoalVX/toGoalL)*32;
        ty=py+(toGoalVY/toGoalL)*32;
      }

      // Шайба уже улетела — возвращаемся в центр своей половины
      if(distToPuck>blue.r+puck.r+55){
        aiPhase='position';
        tx=RINK.x+RINK.w*0.80; ty=gCY;
      }
    }
  }

  const mg=blue.r+4;
  // ИИ строго на своей половине
  tx=Math.max(CENTER_X+mg, Math.min(RINK.x+RINK.w-mg, tx));
  ty=Math.max(RINK.y+mg, Math.min(RINK.y+RINK.h-mg, ty));

  const dx=tx-blue.x, dy=ty-blue.y;
  const dist=Math.hypot(dx,dy);

  if(dist>3){
    const accel=Math.min(p.spd*0.42, dist*0.21);
    blue.vx+=(dx/dist)*accel;
    blue.vy+=(dy/dist)*accel;
  } else {
    blue.vx*=0.5; blue.vy*=0.5;
  }

  const spd=Math.hypot(blue.vx,blue.vy);
  if(spd>p.spd){blue.vx=blue.vx/spd*p.spd;blue.vy=blue.vy/spd*p.spd;}

  // Антизастрял — общий
  if(spd<0.2&&dist>20){blue.vx+=(dx/dist)*1.5;blue.vy+=(dy/dist)*1.5;}
  // Антизастрял от стен — толкаем от каждой стены
  const wm=blue.r+22;
  if(blue.x-RINK.x      <wm) blue.vx+=2.2;
  if((RINK.x+RINK.w)-blue.x<wm) blue.vx-=2.2;
  if(blue.y-RINK.y      <wm) blue.vy+=2.2;
  if((RINK.y+RINK.h)-blue.y<wm) blue.vy-=2.2;
  // Редкий тупняк
  if(Math.random()<0.0015){blue.vx*=0.1;blue.vy*=0.1;}
}

function clamp(pl){
  const s=Math.hypot(pl.vx,pl.vy);
  if(s>SPMAX){pl.vx=pl.vx/s*SPMAX;pl.vy=pl.vy/s*SPMAX;}
}
function movePlayer(pl){
  if(pl===red && dragPointerId!==null){
    // Под пальцем — только зажимаем в поле и не пускаем за центр
    pl.x=Math.max(RINK.x+pl.r, Math.min(CENTER_X-pl.r, pl.x));
    pl.y=Math.max(RINK.y+pl.r, Math.min(RINK.y+RINK.h-pl.r, pl.y));
    return;
  }
  pl.x+=pl.vx; pl.y+=pl.vy;
  pl.vx*=FRIC; pl.vy*=FRIC;
  // Стены
  if(pl.x-pl.r<RINK.x){pl.x=RINK.x+pl.r;pl.vx*=-0.3;}
  if(pl.x+pl.r>RINK.x+RINK.w){pl.x=RINK.x+RINK.w-pl.r;pl.vx*=-0.3;}
  if(pl.y-pl.r<RINK.y){pl.y=RINK.y+pl.r;pl.vy*=-0.3;}
  if(pl.y+pl.r>RINK.y+RINK.h){pl.y=RINK.y+RINK.h-pl.r;pl.vy*=-0.3;}
  // Красный не может зайти за центр
  if(pl===red && pl.x+pl.r>CENTER_X){pl.x=CENTER_X-pl.r;pl.vx=0;}
  // Синий (ИИ) не может зайти на левую половину
  if(pl===blue && pl.x-pl.r<CENTER_X){pl.x=CENTER_X+pl.r;pl.vx=0;}
}
function collidePP(){
  const dx=blue.x-red.x,dy=blue.y-red.y;
  const d=Math.hypot(dx,dy),mn=red.r+blue.r;
  if(d<mn&&d>0){
    const nx=dx/d,ny=dy/d,ov=(mn-d)/2;
    red.x-=nx*ov;red.y-=ny*ov;
    blue.x+=nx*ov;blue.y+=ny*ov;
    const rel=(red.vx-blue.vx)*nx+(red.vy-blue.vy)*ny;
    if(rel>0){
      red.vx-=rel*nx*0.65;red.vy-=rel*ny*0.65;
      blue.vx+=rel*nx*0.65;blue.vy+=rel*ny*0.65;
    }
  }
}
function movePuck(){
  for(const pl of [red,blue]){
    const dx=puck.x-pl.x,dy=puck.y-pl.y;
    const d=Math.hypot(dx,dy),mn=pl.r+puck.r;
    if(d<mn&&d>0){
      const nx=dx/d,ny=dy/d;
      // Выталкиваем шайбу из игрока
      puck.x=pl.x+nx*mn; puck.y=pl.y+ny*mn;
      // Скорость удара = скорость игрока + отражение по нормали
      const relVx=pl.vx-puck.vx, relVy=pl.vy-puck.vy;
      const impulse=(relVx*nx+relVy*ny)*2.6;
      if(impulse>0){
        puck.vx+=nx*impulse;
        puck.vy+=ny*impulse;
        playHit();
      }
      // Минимальная скорость отскока чтобы шайба всегда улетала
      const ps=Math.hypot(puck.vx,puck.vy);
      if(ps<3.5){puck.vx=nx*3.5;puck.vy=ny*3.5;}
      if(ps>18){puck.vx=puck.vx/ps*18;puck.vy=puck.vy/ps*18;}
    }
  }
  puck.x+=puck.vx; puck.y+=puck.vy;
  // Замедление шайбы об лёд — меньше трение чем раньше
  puck.vx*=0.991; puck.vy*=0.991;

  // Стенки верх/низ — упругий отскок с сохранением скорости
  if(puck.y-puck.r<RINK.y){puck.y=RINK.y+puck.r;puck.vy=Math.abs(puck.vy)*0.82;}
  if(puck.y+puck.r>RINK.y+RINK.h){puck.y=RINK.y+RINK.h-puck.r;puck.vy=-Math.abs(puck.vy)*0.82;}

  // Левая стенка — гол или отскок
  if(puck.x-puck.r < RINK.x){
    if(puck.y+puck.r > GY && puck.y-puck.r < GY+GH){
      goal('blue'); return;
    }
    puck.x=RINK.x+puck.r;
    puck.vx=Math.abs(puck.vx)*0.82;
  }
  // Правая стенка — гол или отскок
  if(puck.x+puck.r > RINK.x+RINK.w){
    if(puck.y+puck.r > GY && puck.y-puck.r < GY+GH){
      goal('red'); return;
    }
    puck.x=RINK.x+RINK.w-puck.r;
    puck.vx=-Math.abs(puck.vx)*0.82;
  }
}

// ===== БАГ 5: АНИМАЦИЯ ЗВЁЗДОЧЕК ПРИ ГОЛЕ =====
function spawnGoalStars(x, y, color){
  for(let i=0;i<14;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*5;
    starAnims.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      r: 5+Math.random()*8,
      color,
      life: 60,
      maxLife: 60
    });
  }
}

function goal(who){
  // Определяем куда влетела шайба
  const gx = (who==='blue') ? RINK.x : RINK.x+RINK.w;
  const gy = GY+GH/2;
  if(who==='red'){
    sRed++;
    spawnGoalStars(gx, gy, '#ff4444');
    statsGoals++;
    localStorage.setItem('goals', statsGoals);
  } else {
    sBlue++;
    spawnGoalStars(gx, gy, '#4499ff');
  }

  if(sRed>=scoreLimit||sBlue>=scoreLimit){
    running=false;
    const rw=sRed>=scoreLimit;
    if(rw){ statsWins++; localStorage.setItem('wins', statsWins); }
    else   { statsLosses++; localStorage.setItem('losses', statsLosses); }
    // ELO изменение
    const delta = rw ? Math.floor(15+Math.random()*10) : -Math.floor(15+Math.random()*10);
    playerElo = Math.max(100, playerElo+delta);
    localStorage.setItem('elo', playerElo);
    updateNickUI();
    const eloDelta = document.createElement('div');
    eloDelta.style.cssText='color:'+(rw?'#66ff88':'#ff6666')+';font-size:5vw;font-weight:bold;margin-bottom:2vw;';
    eloDelta.textContent=(rw?'▲+':'▼')+Math.abs(delta)+' ELO';
    const winScreen=document.getElementById('screen-win');
    document.getElementById('win-img').src=rw?'winner2.png':'winner1.png';
    document.getElementById('win-text').textContent=rw?'🔴 Красные победили!':'🔵 Синие победили!';
    document.getElementById('win-text').style.color=rw?'#ff6666':'#6699ff';
    // Удаляем старый ELO элемент если есть
    const old=winScreen.querySelector('.elo-delta');
    if(old)old.remove();
    eloDelta.className='elo-delta';
    winScreen.insertBefore(eloDelta, winScreen.querySelector('.btn'));
    winScreen.style.display='flex';
    // Пружинная анимация картинки
    const wi=document.getElementById('win-img');
    wi.classList.remove('spring');
    void wi.offsetWidth; // reflow
    wi.classList.add('spring');
  } else resetPos();
}

function clipImg(x,y,r,im){
  ctx.save();
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  ctx.drawImage(im,x-r,y-r,r*2,r*2);
  ctx.restore();
}

// Рисуем звёздочку
function drawStar(x,y,r,color,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a1=i*4*Math.PI/5-Math.PI/2;
    const a2=(i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;
    if(i===0) ctx.moveTo(x+r*Math.cos(a1),y+r*Math.sin(a1));
    else       ctx.lineTo(x+r*Math.cos(a1),y+r*Math.sin(a1));
    ctx.lineTo(x+r*0.42*Math.cos(a2),y+r*0.42*Math.sin(a2));
  }
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();
  ctx.restore();
}

// Счётные звёздочки вверху/внизу — с анимацией пульса
const starScaleR = new Array(20).fill(1); // масштаб для каждой красной звезды
const starScaleB = new Array(20).fill(1);
let lastSRed=0, lastSBlue=0;

function drawStars(t){
  const sz=13, gap=21;
  const totalW=(scoreLimit-1)*gap;
  const startX=BW/2-totalW/2;

  // Пульс новой звезды
  if(sRed > lastSRed){ starScaleR[sRed-1]=2.2; lastSRed=sRed; }
  if(sBlue > lastSBlue){ starScaleB[sBlue-1]=2.2; lastSBlue=sBlue; }
  for(let i=0;i<scoreLimit;i++){
    if(starScaleR[i]>1) starScaleR[i]+=(1-starScaleR[i])*0.1;
    if(starScaleB[i]>1) starScaleB[i]+=(1-starScaleB[i])*0.1;
  }

  for(let i=0;i<scoreLimit;i++){
    const sc=i<sRed?starScaleR[i]:1;
    const alpha=i<sRed?1:0.18;
    ctx.save();
    ctx.translate(startX+i*gap, 16);
    ctx.scale(sc,sc);
    drawStar(0,0,sz,i<sRed?'#ff4444':'rgba(255,80,80,1)',alpha);
    ctx.restore();
  }
  for(let i=0;i<scoreLimit;i++){
    const sc=i<sBlue?starScaleB[i]:1;
    const alpha=i<sBlue?1:0.18;
    ctx.save();
    ctx.translate(startX+i*gap, BH-16);
    ctx.scale(sc,sc);
    drawStar(0,0,sz,i<sBlue?'#4499ff':'rgba(80,140,255,1)',alpha);
    ctx.restore();
  }
}

function updateAndDrawGoalStars(){
  for(let i=starAnims.length-1;i>=0;i--){
    const s=starAnims[i];
    s.x+=s.vx; s.y+=s.vy;
    s.vy+=0.12; // гравитация
    s.vx*=0.96; s.vy*=0.96;
    s.life--;
    const alpha=s.life/s.maxLife;
    drawStar(s.x, s.y, s.r, s.color, alpha);
    if(s.life<=0) starAnims.splice(i,1);
  }
}

// Индикатор — где можно нажимать (подсветка кружка при захвате)
function drawGrabHint(){
  if(!running) return;
  if(dragPointerId!==null){
    ctx.beginPath();
    ctx.arc(red.x,red.y,red.r+8,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,80,80,0.9)';
    ctx.lineWidth=3.5;
    ctx.stroke();
  } else {
    const pulse=0.5+0.5*Math.sin(Date.now()*0.005);
    ctx.beginPath();
    ctx.arc(red.x,red.y,red.r+5+pulse*4,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,120,120,${0.2+pulse*0.35})`;
    ctx.lineWidth=2.5;
    ctx.stroke();
  }
}

function draw(){
  ctx.save(); ctx.scale(sx,sy);
  ctx.drawImage(iRink,0,0,BW,BH);

  // Тени
  for(const pl of [red,blue]){
    ctx.beginPath();ctx.ellipse(pl.x,pl.y+10,pl.r*0.85,pl.r*0.3,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fill();
  }

  clipImg(red.x,red.y,red.r,iRed);
  clipImg(blue.x,blue.y,blue.r,iBlue);

  // Подсветка управляемого игрока
  drawGrabHint();

  // ИИ индикатор (опциональный)
  if(aiState==='attack'){
    ctx.beginPath();ctx.arc(blue.x,blue.y,blue.r+6,0,Math.PI*2);
    ctx.strokeStyle='rgba(80,140,255,0.5)';ctx.lineWidth=2.5;ctx.stroke();
  }

  // Шайба тень
  ctx.beginPath();ctx.ellipse(puck.x,puck.y+6,puck.r*0.85,puck.r*0.32,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fill();
  // Шайба
  ctx.beginPath();ctx.arc(puck.x,puck.y,puck.r,0,Math.PI*2);
  ctx.fillStyle='#111';ctx.fill();
  ctx.strokeStyle='#555';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(puck.x-puck.r*0.3,puck.y-puck.r*0.3,puck.r*0.25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();

  // Партиклы гола
  updateAndDrawGoalStars();

  drawStars();
  ctx.restore();
}

function loop(){
  if(!running)return;
  clamp(blue); // красному clamp не нужен — у него нет разгона
  updateAI();
  movePlayer(red);movePlayer(blue);
  collidePP();
  movePuck();
  ctx.clearRect(0,0,c.width,c.height);
  draw();
  requestAnimationFrame(loop);
}

// Fullscreen
function goFS(){
  const el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
}
document.addEventListener('touchstart',goFS,{once:true});
document.addEventListener('click',goFS,{once:true});

// Закрытие модалок по оверлею
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); });
});
