<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Battle - Онлайн рисовалка с сохранением</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: white;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
            background: white;
        }

        .canvas-container:active {
            cursor: grabbing;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            box-shadow: none;
            background: white;
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 20px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
            font-family: monospace;
        }

        .palette {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .color-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 2px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .color-btn.active {
            transform: scale(1.08);
            border: 3px solid #333;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #333;
        }

        .color-btn:hover {
            transform: scale(1.05);
            filter: brightness(0.95);
        }

        .stats {
            display: flex;
            gap: 20px;
            background: #f5f5f5;
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .stats span {
            color: #e67e22;
            font-size: 1.2rem;
            font-weight: 800;
            margin-left: 6px;
        }

        button {
            background: #3498db;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: scale(0.96);
        }

        .reset-btn {
            background: #e74c3c;
        }

        .cooldown {
            background: #ecf0f1;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #2c3e50;
            font-family: monospace;
        }

        .coord-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            font-weight: bold;
            color: #555;
            backdrop-filter: blur(8px);
            border: 1px solid #ddd;
            z-index: 100;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .color-btn { width: 36px; height: 36px; }
            .stats span { font-size: 1rem; }
            .info-panel { padding: 8px 16px; bottom: 12px; left: 12px; right: 12px; }
            .cooldown { font-size: 0.75rem; padding: 4px 12px; }
            button { padding: 6px 16px; font-size: 0.8rem; }
        }

        .instruction {
            position: fixed;
            bottom: 90px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .online-badge {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #2ecc71;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 100;
            font-family: monospace;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="canvas-container" id="canvasContainer">
        <canvas id="pixelCanvas"></canvas>
    </div>
    <div class="online-badge" id="onlineBadge">
        🌐 онлайн
    </div>
    <div class="coord-indicator" id="coordIndicator">
        🖱️ позиция: --
    </div>
    <div class="info-panel">
        <div class="palette" id="palette"></div>
        <div class="stats">
            🎨 пикселей: <span id="totalPixels">0</span>
            👥 <span id="playerCountSpan">1</span>
        </div>
        <button id="resetBtn" class="reset-btn">⟳ Очистить всё</button>
        <div class="cooldown" id="cooldownDisplay">⚡ готов</div>
    </div>
    <div class="instruction">
        🖱️ тяни мышкой для перемещения | клик — поставить пиксель | колесико — масштаб
    </div>
</div>

<script>
    (function() {
        // ========== КОНФИГ ==========
        // Размер мира: 150x150 пикселей (большое поле, но не слишком тяжелое)
        const WORLD_SIZE = 150;
        
        // Размер отображаемого пикселя на канвасе
        let ZOOM_LEVEL = 28;
        
        // Минимальный и максимальный зум
        const MIN_ZOOM = 14;
        const MAX_ZOOM = 56;
        
        // Кулдаун между установкой пикселей (1.5 секунды для динамики)
        const COOLDOWN_MS = 1500;
        
        // Цветовая палитра (яркие, сочные цвета, белый на первом месте)
        const COLORS = [
            "#FFFFFF", // 0 - белый фон
            "#FF6B6B", // 1 - коралловый
            "#4ECDC4", // 2 - бирюзовый
            "#FFE66D", // 3 - желтый
            "#FF9F4A", // 4 - оранжевый
            "#C77DFF", // 5 - фиолетовый
            "#2EC4B6", // 6 - зеленый
            "#E71D36", // 7 - красный
            "#011627", // 8 - темно-синий
            "#F7B05E", // 9 - песочный
            "#9C89B8", // 10 - лаванда
            "#70AE6E", // 11 - травяной
            "#EF476F", // 12 - розовый
            "#FFD166", // 13 - золотой
            "#06D6A0", // 14 - мятный
            "#118AB2", // 15 - глубокий синий
            "#073B4C", // 16 - темный аквамарин
            "#FF8C42", // 17 - мандарин
            "#D90368", // 18 - маджента
            "#2E4057"  // 19 - индиго
        ];
        
        // Данные мира: 2D массив [row][col] = индекс цвета
        let worldGrid = null;
        
        // Состояние камеры
        let cameraX = WORLD_SIZE / 2;
        let cameraY = WORLD_SIZE / 2;
        
        // Размер окна
        let containerWidth = 0;
        let containerHeight = 0;
        
        // Для перетаскивания
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        let dragStartCamX = 0, dragStartCamY = 0;
        
        // Кулдаун
        let lastUpdateTime = 0;
        let isCooldown = false;
        let cooldownTimer = null;
        
        // Текущий выбранный цвет (индекс)
        let currentColorIndex = 1;
        
        // DOM элементы
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const totalPixelsSpan = document.getElementById('totalPixels');
        const playerCountSpan = document.getElementById('playerCountSpan');
        const cooldownDisplay = document.getElementById('cooldownDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const coordIndicator = document.getElementById('coordIndicator');
        const onlineBadge = document.getElementById('onlineBadge');
        
        // ========== ОНЛАЙН СИНХРОНИЗАЦИЯ (между вкладками) ==========
        let broadcastChannel = null;
        let myTabId = Math.random().toString(36).substring(2) + Date.now();
        let activeTabsCount = 1;
        
        // ========== СОХРАНЕНИЕ В localStorage ==========
        function saveWorld() {
            try {
                localStorage.setItem('pixelBattleWorld_150', JSON.stringify(worldGrid));
                // также сохраняем метаданные
                localStorage.setItem('pixelBattleMeta', JSON.stringify({
                    version: '2.0',
                    lastSave: Date.now(),
                    worldSize: WORLD_SIZE
                }));
            } catch(e) {
                console.warn('Ошибка сохранения:', e);
            }
        }
        
        function loadWorld() {
            const saved = localStorage.getItem('pixelBattleWorld_150');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length === WORLD_SIZE && parsed[0] && parsed[0].length === WORLD_SIZE) {
                        worldGrid = parsed;
                        return true;
                    }
                } catch(e) {
                    console.warn('Ошибка загрузки сохранения');
                }
            }
            // Создаем новый мир: все пиксели белые
            worldGrid = Array(WORLD_SIZE).fill().map(() => Array(WORLD_SIZE).fill(0));
            return false;
        }
        
        // ========== ОТРИСОВКА ==========
        function resizeCanvas() {
            if (!container) return;
            containerWidth = container.clientWidth;
            containerHeight = container.clientHeight;
            canvas.width = containerWidth;
            canvas.height = containerHeight;
            drawCanvas();
        }
        
        function drawCanvas() {
            if (!ctx || !worldGrid) return;
            
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Определяем видимую область
            const viewWorldWidth = canvas.width / ZOOM_LEVEL;
            const viewWorldHeight = canvas.height / ZOOM_LEVEL;
            
            let leftWorld = cameraX - viewWorldWidth / 2;
            let topWorld = cameraY - viewWorldHeight / 2;
            let rightWorld = cameraX + viewWorldWidth / 2;
            let bottomWorld = cameraY + viewWorldHeight / 2;
            
            let startCol = Math.max(0, Math.floor(leftWorld));
            let endCol = Math.min(WORLD_SIZE - 1, Math.ceil(rightWorld));
            let startRow = Math.max(0, Math.floor(topWorld));
            let endRow = Math.min(WORLD_SIZE - 1, Math.ceil(bottomWorld));
            
            for (let row = startRow; row <= endRow; row++) {
                for (let col = startCol; col <= endCol; col++) {
                    const colorIndex = worldGrid[row][col];
                    const fillColor = COLORS[colorIndex] || COLORS[0];
                    
                    const screenX = (col - leftWorld) * ZOOM_LEVEL;
                    const screenY = (row - topWorld) * ZOOM_LEVEL;
                    const size = ZOOM_LEVEL;
                    
                    if (screenX + size > 0 && screenX < canvas.width && screenY + size > 0 && screenY < canvas.height) {
                        ctx.fillStyle = fillColor;
                        ctx.fillRect(screenX, screenY, size - 0.5, size - 0.5);
                        
                        ctx.strokeStyle = "rgba(0,0,0,0.06)";
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(screenX, screenY, size, size);
                    }
                }
            }
            
            // Подсчет небелых пикселей
            let nonWhitePixels = 0;
            for (let i = 0; i < WORLD_SIZE; i++) {
                for (let j = 0; j < WORLD_SIZE; j++) {
                    if (worldGrid[i][j] !== 0) nonWhitePixels++;
                }
            }
            totalPixelsSpan.innerText = nonWhitePixels.toLocaleString();
        }
        
        // ========== УСТАНОВКА ПИКСЕЛЯ ==========
        function setPixel(worldX, worldY, colorIndex, sourceId = null, isSync = false) {
            if (worldX < 0 || worldX >= WORLD_SIZE || worldY < 0 || worldY >= WORLD_SIZE) return false;
            if (colorIndex < 0 || colorIndex >= COLORS.length) return false;
            if (worldGrid[worldY][worldX] === colorIndex) return false;
            
            // Проверка кулдауна (только для локальных действий)
            if (sourceId === null && !isSync) {
                if (isCooldown) {
                    const remaining = Math.ceil((lastUpdateTime + COOLDOWN_MS - Date.now()) / 1000);
                    cooldownDisplay.innerText = `⏳ ${remaining}с`;
                    return false;
                }
                isCooldown = true;
                lastUpdateTime = Date.now();
                updateCooldownUI();
            }
            
            worldGrid[worldY][worldX] = colorIndex;
            drawCanvas();
            saveWorld();
            
            // Оповещаем другие вкладки
            if (sourceId === null && broadcastChannel && !isSync) {
                broadcastChannel.postMessage({
                    type: 'PIXEL_UPDATE',
                    x: worldX,
                    y: worldY,
                    colorIndex: colorIndex,
                    tabId: myTabId,
                    timestamp: Date.now()
                });
            }
            
            return true;
        }
        
        // ========== КУЛДАУН UI ==========
        function updateCooldownUI() {
            if (cooldownTimer) clearInterval(cooldownTimer);
            if (!isCooldown) {
                cooldownDisplay.innerHTML = "⚡ готов";
                return;
            }
            const updateRemaining = () => {
                const remaining = lastUpdateTime + COOLDOWN_MS - Date.now();
                if (remaining <= 0) {
                    isCooldown = false;
                    cooldownDisplay.innerHTML = "⚡ готов";
                    if (cooldownTimer) clearInterval(cooldownTimer);
                    cooldownTimer = null;
                } else {
                    const seconds = Math.ceil(remaining / 1000);
                    cooldownDisplay.innerHTML = `⏳ ${seconds}с`;
                }
            };
            updateRemaining();
            cooldownTimer = setInterval(updateRemaining, 200);
        }
        
        // ========== ПЕРЕМЕЩЕНИЕ КАМЕРЫ ==========
        function startDrag(e) {
            isDragging = true;
            const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
            dragStartX = clientX;
            dragStartY = clientY;
            dragStartCamX = cameraX;
            dragStartCamY = cameraY;
            container.style.cursor = 'grabbing';
            e.preventDefault();
        }
        
        function onDrag(e) {
            if (!isDragging) return;
            const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
            
            const deltaX = (clientX - dragStartX) / ZOOM_LEVEL;
            const deltaY = (clientY - dragStartY) / ZOOM_LEVEL;
            
            let newCamX = dragStartCamX - deltaX;
            let newCamY = dragStartCamY - deltaY;
            
            const viewWorldWidth = canvas.width / ZOOM_LEVEL;
            const viewWorldHeight = canvas.height / ZOOM_LEVEL;
            
            newCamX = Math.max(viewWorldWidth / 2, Math.min(WORLD_SIZE - viewWorldWidth / 2, newCamX));
            newCamY = Math.max(viewWorldHeight / 2, Math.min(WORLD_SIZE - viewWorldHeight / 2, newCamY));
            
            cameraX = newCamX;
            cameraY = newCamY;
            drawCanvas();
            updateCoordIndicator();
            e.preventDefault();
        }
        
        function endDrag() {
            isDragging = false;
            container.style.cursor = 'grab';
        }
        
        // ========== КЛИК ДЛЯ УСТАНОВКИ ==========
        function handleCanvasClick(e) {
            if (isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
            const canvasY = (clientY - rect.top) * (canvas.height / rect.height);
            
            if (canvasX < 0 || canvasX >= canvas.width || canvasY < 0 || canvasY >= canvas.height) return;
            
            const viewWorldWidth = canvas.width / ZOOM_LEVEL;
            const viewWorldHeight = canvas.height / ZOOM_LEVEL;
            const leftWorld = cameraX - viewWorldWidth / 2;
            const topWorld = cameraY - viewWorldHeight / 2;
            
            const worldX = Math.floor(leftWorld + canvasX / ZOOM_LEVEL);
            const worldY = Math.floor(topWorld + canvasY / ZOOM_LEVEL);
            
            if (worldX >= 0 && worldX < WORLD_SIZE && worldY >= 0 && worldY < WORLD_SIZE) {
                setPixel(worldX, worldY, currentColorIndex, null, false);
                updateCoordIndicatorPos(worldX, worldY);
            }
        }
        
        function updateCoordIndicator() {
            coordIndicator.innerHTML = `📍 мир: ${Math.round(cameraX)}, ${Math.round(cameraY)} | 🔍 ${Math.round(ZOOM_LEVEL)}px`;
        }
        
        function updateCoordIndicatorPos(x, y) {
            coordIndicator.innerHTML = `📍 мир: ${x}, ${y} | 🔍 ${Math.round(ZOOM_LEVEL)}px`;
            setTimeout(() => updateCoordIndicator(), 1500);
        }
        
        // ========== ЗУМ ==========
        function handleWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -1 : 1;
            const newZoom = ZOOM_LEVEL + delta * 2;
            if (newZoom >= MIN_ZOOM && newZoom <= MAX_ZOOM) {
                ZOOM_LEVEL = newZoom;
                
                const viewWorldWidth = canvas.width / ZOOM_LEVEL;
                const viewWorldHeight = canvas.height / ZOOM_LEVEL;
                
                cameraX = Math.max(viewWorldWidth / 2, Math.min(WORLD_SIZE - viewWorldWidth / 2, cameraX));
                cameraY = Math.max(viewWorldHeight / 2, Math.min(WORLD_SIZE - viewWorldHeight / 2, cameraY));
                
                drawCanvas();
                updateCoordIndicator();
            }
        }
        
        // ========== СБРОС ==========
        function resetWorld() {
            if (confirm(`Сбросить всё полотно (${WORLD_SIZE}x${WORLD_SIZE})? Все пиксели станут белыми!`)) {
                for (let i = 0; i < WORLD_SIZE; i++) {
                    for (let j = 0; j < WORLD_SIZE; j++) {
                        worldGrid[i][j] = 0;
                    }
                }
                drawCanvas();
                saveWorld();
                if (broadcastChannel) {
                    broadcastChannel.postMessage({
                        type: 'RESET',
                        tabId: myTabId,
                        timestamp: Date.now()
                    });
                }
                if (isCooldown) {
                    isCooldown = false;
                    if (cooldownTimer) clearInterval(cooldownTimer);
                    cooldownDisplay.innerHTML = "⚡ готов";
                }
            }
        }
        
        // ========== ПАЛИТРА ==========
        function buildPalette() {
            const paletteDiv = document.getElementById('palette');
            paletteDiv.innerHTML = '';
            COLORS.forEach((color, idx) => {
                if (idx === 0) return;
                const btn = document.createElement('div');
                btn.className = 'color-btn';
                if (idx === currentColorIndex) btn.classList.add('active');
                btn.style.backgroundColor = color;
                btn.setAttribute('data-color-index', idx);
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    currentColorIndex = idx;
                    document.querySelectorAll('.color-btn').forEach(el => el.classList.remove('active'));
                    btn.classList.add('active');
                });
                paletteDiv.appendChild(btn);
            });
        }
        
        // ========== ОНЛАЙН МУЛЬТИПЛЕЕР (синхронизация между вкладками) ==========
        function initOnlineMultiplayer() {
            if (!window.BroadcastChannel) {
                playerCountSpan.innerText = "1";
                onlineBadge.style.background = "#95a5a6";
                onlineBadge.innerHTML = "📡 офлайн";
                return;
            }
            
            try {
                broadcastChannel = new BroadcastChannel('pixel_battle_online_150');
                
                broadcastChannel.onmessage = (event) => {
                    const data = event.data;
                    if (!data || data.tabId === myTabId) return;
                    
                    if (data.type === 'PIXEL_UPDATE') {
                        const { x, y, colorIndex } = data;
                        if (x !== undefined && y !== undefined && colorIndex !== undefined) {
                            if (worldGrid[y] && worldGrid[y][x] !== colorIndex) {
                                worldGrid[y][x] = colorIndex;
                                drawCanvas();
                                saveWorld();
                            }
                        }
                    } else if (data.type === 'RESET') {
                        for (let i = 0; i < WORLD_SIZE; i++) {
                            for (let j = 0; j < WORLD_SIZE; j++) {
                                worldGrid[i][j] = 0;
                            }
                        }
                        drawCanvas();
                        saveWorld();
                    } else if (data.type === 'HEARTBEAT' || data.type === 'ACTIVITY') {
                        updateActivePlayers();
                    }
                };
                
                // Запускаем подсчет активных игроков
                updateActivePlayers();
                
                // Периодические heartbeat
                setInterval(() => {
                    if (broadcastChannel) {
                        broadcastChannel.postMessage({ type: 'HEARTBEAT', tabId: myTabId, time: Date.now() });
                        updateActivePlayers();
                    }
                }, 5000);
                
                // Отправляем начальный сигнал
                setTimeout(() => {
                    if (broadcastChannel) {
                        broadcastChannel.postMessage({ type: 'ACTIVITY', tabId: myTabId });
                    }
                }, 100);
                
                onlineBadge.style.background = "#2ecc71";
                onlineBadge.innerHTML = "🌐 онлайн | синхр.";
                
            } catch(e) {
                console.warn('BroadcastChannel ошибка');
                playerCountSpan.innerText = "1";
                onlineBadge.style.background = "#95a5a6";
                onlineBadge.innerHTML = "📡 офлайн";
            }
        }
        
        function updateActivePlayers() {
            if (!broadcastChannel) {
                playerCountSpan.innerText = "1";
                return;
            }
            
            const ACTIVE_KEY = 'pixelBattle_active_150';
            const now = Date.now();
            let activeMap = {};
            
            try {
                const raw = localStorage.getItem(ACTIVE_KEY);
                if (raw) activeMap = JSON.parse(raw);
            } catch(e) {}
            
            activeMap[myTabId] = now;
            
            // Удаляем старые записи (старше 12 секунд)
            for (let id in activeMap) {
                if (now - activeMap[id] > 12000) {
                    delete activeMap[id];
                }
            }
            
            localStorage.setItem(ACTIVE_KEY, JSON.stringify(activeMap));
            const count = Object.keys(activeMap).length;
            activeTabsCount = count;
            playerCountSpan.innerText = count;
            
            // Обновляем бейдж
            if (count > 1) {
                onlineBadge.style.background = "#2ecc71";
                onlineBadge.innerHTML = `🌐 онлайн: ${count} чел.`;
            } else {
                onlineBadge.style.background = "#3498db";
                onlineBadge.innerHTML = `🌐 вы один`;
            }
            
            // Рассылаем активность
            if (broadcastChannel) {
                broadcastChannel.postMessage({ type: 'ACTIVITY', tabId: myTabId, timestamp: now });
            }
        }
        
        // ========== СОБЫТИЯ ==========
        function initEvents() {
            container.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', onDrag);
            window.addEventListener('mouseup', endDrag);
            
            container.addEventListener('touchstart', startDrag, { passive: false });
            window.addEventListener('touchmove', onDrag, { passive: false });
            window.addEventListener('touchend', endDrag);
            
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('touchstart', (e) => {
                if (!isDragging) {
                    handleCanvasClick(e);
                }
            });
            
            container.addEventListener('wheel', handleWheel, { passive: false });
            resetBtn.addEventListener('click', resetWorld);
            
            window.addEventListener('resize', () => {
                resizeCanvas();
                const viewWorldWidth = canvas.width / ZOOM_LEVEL;
                const viewWorldHeight = canvas.height / ZOOM_LEVEL;
                cameraX = Math.max(viewWorldWidth / 2, Math.min(WORLD_SIZE - viewWorldWidth / 2, cameraX));
                cameraY = Math.max(viewWorldHeight / 2, Math.min(WORLD_SIZE - viewWorldHeight / 2, cameraY));
                drawCanvas();
            });
            
            // Сохраняем мир при закрытии вкладки
            window.addEventListener('beforeunload', () => {
                saveWorld();
                if (broadcastChannel) {
                    broadcastChannel.postMessage({ type: 'TAB_CLOSE', tabId: myTabId });
                }
            });
        }
        
        // ========== ЗАПУСК ==========
        function init() {
            loadWorld();
            buildPalette();
            resizeCanvas();
            initEvents();
            initOnlineMultiplayer();
            
            // Настройка камеры в центр
            cameraX = WORLD_SIZE / 2;
            cameraY = WORLD_SIZE / 2;
            const viewWorldWidth = canvas.width / ZOOM_LEVEL;
            const viewWorldHeight = canvas.height / ZOOM_LEVEL;
            cameraX = Math.max(viewWorldWidth / 2, Math.min(WORLD_SIZE - viewWorldWidth / 2, cameraX));
            cameraY = Math.max(viewWorldHeight / 2, Math.min(WORLD_SIZE - viewWorldHeight / 2, cameraY));
            
            drawCanvas();
            updateCoordIndicator();
            
            // Автосохранение каждые 10 секунд
            setInterval(() => {
                saveWorld();
            }, 10000);
        }
        
        init();
    })();
</script>
</body>
</html>
