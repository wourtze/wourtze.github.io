<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ EngMaster · с нуля до C1 ✨</title>
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9f7fe 0%, #eef2ff 100%);
            min-height: 100vh;
            padding: 1.5rem 1rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            max-width: 1200px;
            width: 100%;
        }

        /* заголовок и уровень */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e1b4b, #3730a3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .level-badge {
            background: white;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(79, 70, 229, 0.2);
        }

        .level-badge i {
            color: #4f46e5;
        }

        /* навигация по режимам */
        .mode-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.5);
            padding: 0.75rem;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .mode-btn {
            background: transparent;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: none;
        }

        .mode-btn i {
            font-size: 1.2rem;
        }

        .mode-btn.active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .mode-btn:hover:not(.active) {
            background: rgba(255,255,255,0.7);
        }

        /* карточки/панели */
        .mode-panel {
            display: none;
            animation: fade 0.3s ease;
        }

        .mode-panel.active-panel {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0.4; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* карточка (флеш-режим) */
        .flashcard-area {
            background: white;
            border-radius: 48px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 30px 40px -20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }

        .card-img {
            background: #f1f5f9;
            border-radius: 36px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img i {
            font-size: 8rem;
            color: #1e293b;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
        }

        .card-word {
            font-size: 3.8rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .card-transcription {
            font-size: 1.5rem;
            color: #64748b;
            margin-bottom: 1rem;
        }

        .card-translate {
            font-size: 1.8rem;
            color: #4f46e5;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .flash-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: #eef2ff;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #1e1b4b;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            border: 1px solid transparent;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
            box-shadow: 0 12px 20px -8px #4f46e5;
        }

        .btn-primary:hover {
            background: #4338ca;
            transform: scale(1.02);
        }

        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
        }

        .btn-outline:hover {
            background: #f8fafc;
            border-color: #4f46e5;
        }

        /* проверочная (quiz) */
        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            padding: 2.2rem;
            box-shadow: 0 30px 40px -20px rgba(0,0,0,0.2);
        }

        .quiz-question {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .quiz-options {
            display: grid;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .quiz-option {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            padding: 1.2rem 1.8rem;
            font-size: 1.4rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s;
            text-align: left;
        }

        .quiz-option:hover {
            background: #eef2ff;
            border-color: #4f46e5;
        }

        .quiz-option.correct {
            background: #22c55e;
            border-color: #16a34a;
            color: white;
        }

        .quiz-option.wrong {
            background: #ef4444;
            border-color: #b91c1c;
            color: white;
        }

        .quiz-feedback {
            min-height: 3rem;
            font-size: 1.3rem;
            margin: 1rem 0;
        }

        /* игры */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
        }

        .game-card {
            background: white;
            border-radius: 36px;
            padding: 1.8rem;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.08);
            border: 1px solid #ffffff;
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .match-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .match-word {
            background: #1e293b;
            color: white;
            padding: 0.9rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            flex: 1;
            text-align: center;
            min-width: 120px;
        }

        .match-select {
            flex: 1.5;
            padding: 0.9rem;
            border-radius: 60px;
            border: 2px solid #cbd5e1;
            font-size: 1rem;
            font-weight: 500;
            background: white;
        }

        .speed-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .speed-option {
            background: #f1f5f9;
            padding: 0.9rem 1.2rem;
            border-radius: 60px;
            flex: 1;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .speed-option.selected-speed {
            background: #4f46e5;
            color: white;
        }

        .scramble-display {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 8px;
            background: #0f172a;
            color: white;
            padding: 1rem;
            border-radius: 30px;
            text-align: center;
            margin: 1.5rem 0;
        }

        .scramble-input {
            width: 100%;
            padding: 1rem;
            border-radius: 60px;
            border: 2px solid #cbd5e1;
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        .progress-indicator {
            margin-top: 1rem;
            font-weight: 500;
            color: #334155;
        }

        .streak {
            color: #4f46e5;
            font-weight: 700;
        }

        .footer-note {
            margin-top: 3rem;
            text-align: center;
            color: #64748b;
        }

        i {
            margin-right: 6px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-graduation-cap"></i> EngC1 · Карточки & игры</h1>
        <div class="level-badge">
            <i class="fas fa-arrow-up"></i> A0 → C1
            <i class="fas fa-bolt"></i>
        </div>
    </div>

    <!-- табы режимов -->
    <div class="mode-tabs">
        <button class="mode-btn active" data-mode="flash"><i class="fas fa-clone"></i> Карточки</button>
        <button class="mode-btn" data-mode="quiz"><i class="fas fa-check-double"></i> Проверочная</button>
        <button class="mode-btn" data-mode="games"><i class="fas fa-gamepad"></i> Игры (3 режима)</button>
    </div>

    <!-- ********** ПАНЕЛЬ КАРТОЧЕК ********** -->
    <div id="panel-flash" class="mode-panel active-panel">
        <div class="flashcard-area">
            <div class="card-img">
                <i id="flashIcon" class="fas fa-dog"></i>
            </div>
            <div class="card-word" id="flashWord">dog</div>
            <div class="card-transcription" id="flashTrans">/dɒɡ/</div>
            <div class="card-translate" id="flashTranslate">собака</div>
            <div class="flash-actions">
                <button class="btn btn-primary" id="nextFlashBtn"><i class="fas fa-arrow-right"></i> Следующая</button>
                <button class="btn btn-outline" id="speakFlashBtn"><i class="fas fa-volume-up"></i> Озвучить</button>
                <button class="btn btn-outline" id="flipHintBtn"><i class="fas fa-lightbulb"></i> Подсказка</button>
            </div>
            <div style="margin-top: 1.2rem; color:#64748b;"><span id="cardIndexDisplay">1/12</span> · карточка</div>
        </div>
    </div>

    <!-- ********** ПРОВЕРОЧНАЯ (QUIZ) ********** -->
    <div id="panel-quiz" class="mode-panel">
        <div class="quiz-container">
            <div class="quiz-question" id="quizQuestion">Выберите перевод:</div>
            <div class="quiz-options" id="quizOptions"></div>
            <div class="quiz-feedback" id="quizFeedback"></div>
            <button class="btn btn-primary" id="nextQuizBtn" style="width:100%;"><i class="fas fa-forward"></i> Следующий вопрос</button>
            <div style="margin-top:1rem; display:flex; justify-content:space-between;">
                <span><i class="far fa-star"></i> Счёт: <span id="quizScore">0</span></span>
                <span><i class="fas fa-fire"></i> Серия: <span id="quizStreak">0</span></span>
            </div>
        </div>
    </div>

    <!-- ********** ИГРЫ (ТРИ РЕЖИМА) ********** -->
    <div id="panel-games" class="mode-panel">
        <div class="games-grid">
            <!-- Игра 1: Matching (соотнеси) -->
            <div class="game-card">
                <div class="game-title"><i class="fas fa-handshake"></i> Соотнеси</div>
                <div id="matchGameArea">
                    <!-- динамически заполняется -->
                </div>
                <button class="btn btn-outline" id="newMatchBtn" style="margin-top:1rem;"><i class="fas fa-sync-alt"></i> Новый раунд</button>
                <div id="matchResult"></div>
            </div>

            <!-- Игра 2: Speed choice (быстрый выбор) -->
            <div class="game-card">
                <div class="game-title"><i class="fas fa-stopwatch"></i> Быстрый выбор</div>
                <div id="speedQuestion" style="font-size:2rem; font-weight:700;">apple</div>
                <div class="speed-buttons" id="speedOptions"></div>
                <div><span id="speedFeedback"></span> <span id="speedStreak" style="float:right;">🔥0</span></div>
                <button class="btn btn-outline" id="nextSpeedBtn" style="margin-top:1.2rem;">Дальше</button>
            </div>

            <!-- Игра 3: Scramble (перемешанные буквы) -->
            <div class="game-card">
                <div class="game-title"><i class="fas fa-jigsaw-piece"></i> Собери слово</div>
                <div class="scramble-display" id="scrambleWord">pplea</div>
                <input type="text" id="scrambleInput" class="scramble-input" placeholder="Введи слово" autocomplete="off">
                <button class="btn btn-primary" id="checkScrambleBtn" style="width:100%;"><i class="fas fa-check"></i> Проверить</button>
                <button class="btn btn-outline" id="newScrambleBtn" style="margin-top:0.8rem; width:100%;">Новое слово</button>
                <div id="scrambleResult" style="margin-top:0.8rem;"></div>
            </div>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-brain"></i> Учись с нуля до продвинутого — картинки + игры
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ----- БАЗА СЛОВ (A0 → C1) с иконками Font Awesome (эмуляция картинок) -----
        const vocabulary = [
            { word: "
