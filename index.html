<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Хоккейное табло - Счет "Ёлочка" | Онлайн трансляция</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1f2e 0%, #07161f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Oswald', system-ui, sans-serif;
            padding: 20px;
        }

        .scoreboard {
            max-width: 1300px;
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 70px;
            padding: 25px 35px 35px 35px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.4);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            background: #000000aa;
            padding: 12px 25px;
            border-radius: 60px;
            margin-bottom: 30px;
            gap: 15px;
        }

        .online-status {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0a2f1f;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.2rem;
        }

        .online-led {
            width: 14px;
            height: 14px;
            background-color: #2eff8c;
            border-radius: 50%;
            box-shadow: 0 0 8px #2eff8c;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .period-box, .time-box {
            background: #11161c;
            padding: 6px 22px;
            border-radius: 40px;
            font-size: 1.4rem;
            font-family: monospace;
            color: #f5e56b;
        }

        .period-box span, .time-box span {
            color: #ccddee;
            margin-right: 12px;
        }

        .teams-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 35px;
        }

        .team-card {
            flex: 1;
            min-width: 260px;
            background: linear-gradient(135deg, #1c2a36 0%, #0f1a22 100%);
            border-radius: 55px;
            padding: 20px 20px 30px;
            text-align: center;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5);
            border-bottom: 5px solid #f5b642;
        }

        .team-name {
            font-size: 2.3rem;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .main-score {
            font-size: 5.2rem;
            font-weight: 900;
            font-family: monospace;
            background: #000000aa;
            display: inline-block;
            padding: 5px 30px;
            border-radius: 70px;
            margin: 15px 0;
            color: #ffd966;
            text-shadow: 0 0 6px #ffa500;
            letter-spacing: 8px;
        }

        .period-scores {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            background: #00000066;
            padding: 12px 15px;
            border-radius: 50px;
            flex-wrap: wrap;
        }

        .period-item {
            text-align: center;
            min-width: 65px;
            background: #010b10;
            border-radius: 30px;
            padding: 5px 0;
        }

        .period-label {
            font-size: 0.8rem;
            color: #bbccdd;
            font-weight: bold;
        }

        .period-value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: monospace;
            color: #f5d742;
        }

        .controls {
            background: #0e1a21cc;
            border-radius: 60px;
            padding: 20px 25px;
            backdrop-filter: blur(5px);
        }

        .score-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            background: #00000055;
            padding: 8px 18px;
            border-radius: 50px;
            align-items: center;
        }

        button {
            background: #2c3e2f;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            width: 56px;
            height: 56px;
            border-radius: 40px;
            cursor: pointer;
            color: white;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #0f2a0f;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0f2a0f;
        }

        .btn-danger {
            background: #8b3c2c;
            box-shadow: 0 4px 0 #4e1e12;
        }

        .btn-warning {
            background: #b87c2e;
            box-shadow: 0 4px 0 #6e491c;
        }

        .btn-primary {
            background: #1f6392;
            box-shadow: 0 4px 0 #0d3a55;
        }

        .reset-btn {
            background: #3a2c2f;
            width: auto;
            padding: 0 25px;
            font-size: 1.2rem;
        }

        .period-control {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0 5px;
            flex-wrap: wrap;
        }

        .sync-status {
            text-align: center;
            font-size: 0.8rem;
            color: #b6d7ff;
            margin-top: 20px;
            background: #00000066;
            padding: 6px;
            border-radius: 30px;
        }

        @media (max-width: 780px) {
            .scoreboard { padding: 20px; }
            .team-name { font-size: 1.6rem; }
            .main-score { font-size: 3.5rem; letter-spacing: 4px; }
            .period-value { font-size: 1.4rem; }
            button { width: 48px; height: 48px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="scoreboard">
    <div class="info-panel">
        <div class="online-status">
            <div class="online-led"></div>
            <span id="connectionText">ПОДКЛЮЧЕНИЕ...</span>
        </div>
        <div class="period-box">
            <span>ПЕРИОД</span>
            <span id="periodNumber">1</span>
        </div>
        <div class="time-box">
            <span>ВРЕМЯ</span>
            <span id="gameTime">20:00</span>
        </div>
    </div>

    <div class="teams-container">
        <div class="team-card">
            <div class="team-name" id="homeName">ХОЗЯЕВА</div>
            <div class="main-score" id="homeMainScore">0</div>
            <div class="period-scores" id="homePeriods"></div>
        </div>

        <div class="team-card">
            <div class="team-name" id="awayName">ГОСТИ</div>
            <div class="main-score" id="awayMainScore">0</div>
            <div class="period-scores" id="awayPeriods"></div>
        </div>
    </div>

    <div class="controls">
        <div class="score-buttons">
            <div class="btn-group">
                <span>🏒 ХОЗЯЕВА</span>
                <button id="homePlus1" class="btn-primary">+1</button>
                <button id="homeMinus1" class="btn-danger">-1</button>
            </div>
            <div class="btn-group">
                <span>🥅 ГОСТИ</span>
                <button id="awayPlus1" class="btn-primary">+1</button>
                <button id="awayMinus1" class="btn-danger">-1</button>
            </div>
            <div class="btn-group">
                <button id="resetScores" class="reset-btn">СБРОС СЧЁТА</button>
            </div>
        </div>
        
        <div class="period-control">
            <button id="periodPrev" class="btn-warning">◀ ПЕРИОД</button>
            <button id="periodNext" class="btn-warning">ПЕРИОД ▶</button>
            <button id="timeReset" class="reset-btn">СБРОС ВРЕМЕНИ</button>
        </div>
        <div class="period-control">
            <button id="timeSub10" class="reset-btn">-10 СЕК</button>
            <button id="timeAdd10" class="reset-btn">+10 СЕК</button>
            <button id="timeSubMin" class="reset-btn">-1 МИН</button>
            <button id="timeAddMin" class="reset-btn">+1 МИН</button>
        </div>
        <div class="sync-status" id="syncMsg">
            🔄 Синхронизация с сервером...
        </div>
    </div>
</div>

<script>
    // ==================== НАСТРОЙКА ПОДКЛЮЧЕНИЯ К VPS ====================
    // 🔴 ЗАМЕНИТЕ НА IP ИЛИ ДОМЕН ВАШЕГО VPS!
    const VPS_IP = "ВАШ_IP_ИЛИ_ДОМЕН";  // Например: "192.168.1.100" или "scoreboard.example.com"
    const WS_PORT = "8080";              // Порт, на котором работает сервер
    
    const WS_URL = `ws://${VPS_IP}:${WS_PORT}`;
    // Если используете SSL (wss), раскомментируйте строку ниже и закомментируйте верхнюю:
    // const WS_URL = `wss://${VPS_IP}:${WS_PORT}`;
    
    // Состояние матча
    let matchState = {
        home: { name: "ХОЗЯЕВА", periods: [0, 0, 0], total: 0 },
        away: { name: "ГОСТИ", periods: [0, 0, 0], total: 0 },
        period: 1,
        timeSeconds: 1200
    };
    
    let socket = null;
    let connectionActive = false;
    
    // Функция пересчета общего счета
    function recalcTotal(team) {
        let sum = 0;
        for (let i = 0; i < matchState[team].periods.length; i++) {
            sum += matchState[team].periods[i];
        }
        matchState[team].total = sum;
        return sum;
    }
    
    // Обновление интерфейса
    function refreshUI() {
        document.getElementById('homeMainScore').innerText = matchState.home.total;
        document.getElementById('awayMainScore').innerText = matchState.away.total;
        document.getElementById('homeName').innerText = matchState.home.name;
        document.getElementById('awayName').innerText = matchState.away.name;
        document.getElementById('periodNumber').innerText = matchState.period;
        
        let minutes = Math.floor(matchState.timeSeconds / 60);
        let seconds = matchState.timeSeconds % 60;
        document.getElementById('gameTime').innerText = 
            `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        
        // Ёлочка для HOME
        const homePeriodDiv = document.getElementById('homePeriods');
        homePeriodDiv.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            homePeriodDiv.innerHTML += `
                <div class="period-item">
                    <div class="period-label">${i+1} ПЕР</div>
                    <div class="period-value">${matchState.home.periods[i]}</div>
                </div>`;
        }
        
        // Ёлочка для AWAY
        const awayPeriodDiv = document.getElementById('awayPeriods');
        awayPeriodDiv.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            awayPeriodDiv.innerHTML += `
                <div class="period-item">
                    <div class="period-label">${i+1} ПЕР</div>
                    <div class="period-value">${matchState.away.periods[i]}</div>
                </div>`;
        }
    }
    
    // Отправка изменений на сервер
    function broadcastState() {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
                type: "UPDATE_STATE",
                data: matchState
            }));
        }
    }
    
    // Добавление гола
    function addGoal(team, delta) {
        let periodIdx = matchState.period - 1;
        if (periodIdx < 0 || periodIdx > 2) return;
        let newVal = matchState[team].periods[periodIdx] + delta;
        if (newVal < 0) newVal = 0;
        matchState[team].periods[periodIdx] = newVal;
        recalcTotal(team);
        refreshUI();
        broadcastState();
    }
    
    function resetAllScores() {
        matchState.home.periods = [0, 0, 0];
        matchState.away.periods = [0, 0, 0];
        recalcTotal('home');
        recalcTotal('away');
        refreshUI();
        broadcastState();
    }
    
    function setPeriod(periodNum) {
        if (periodNum >= 1 && periodNum <= 3) {
            matchState.period = periodNum;
            refreshUI();
            broadcastState();
        }
    }
    
    function adjustTime(deltaSec) {
        let newTime = matchState.timeSeconds + deltaSec;
        if (newTime < 0) newTime = 0;
        if (newTime > 3600) newTime = 3600;
        matchState.timeSeconds = newTime;
        refreshUI();
        broadcastState();
    }
    
    function setTimeToDefault() {
        matchState.timeSeconds = 1200;
        refreshUI();
        broadcastState();
    }
    
    // Применение состояния от сервера
    function applyRemoteState(remoteState) {
        if (!remoteState) return;
        if (remoteState.home && remoteState.away) {
            matchState = {
                home: {
                    name: remoteState.home.name || "ХОЗЯЕВА",
                    periods: remoteState.home.periods ? [...remoteState.home.periods] : [0, 0, 0],
                    total: remoteState.home.total || 0
                },
                away: {
                    name: remoteState.away.name || "ГОСТИ",
                    periods: remoteState.away.periods ? [...remoteState.away.periods] : [0, 0, 0],
                    total: remoteState.away.total || 0
                },
                period: remoteState.period || 1,
                timeSeconds: remoteState.timeSeconds || 1200
            };
            recalcTotal('home');
            recalcTotal('away');
            refreshUI();
        }
    }
    
    function updateConnectionStatus(isConnected) {
        connectionActive = isConnected;
        const statusSpan = document.getElementById('connectionText');
        const syncMsg = document.getElementById('syncMsg');
        const led = document.querySelector('.online-led');
        
        if (isConnected) {
            statusSpan.innerText = 'ОНЛАЙН · СИНХР.';
            led.style.backgroundColor = '#2eff8c';
            syncMsg.innerHTML = '✅ СВЯЗЬ С VPS • данные синхронизируются в реальном времени';
        } else {
            statusSpan.innerText = 'ОФЛАЙН РЕЖИМ';
            led.style.backgroundColor = '#ff884d';
            syncMsg.innerHTML = '⚠️ НЕТ СВЯЗИ С СЕРВЕРОМ • изменения сохраняются локально';
        }
    }
    
    // WebSocket подключение
    function connectWebSocket() {
        if (socket) socket.close();
        
        try {
            socket = new WebSocket(WS_URL);
            
            socket.onopen = () => {
                console.log("✅ WebSocket connected to VPS");
                updateConnectionStatus(true);
                socket.send(JSON.stringify({ type: "REQUEST_STATE" }));
            };
            
            socket.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === "FULL_STATE" || msg.type === "STATE_UPDATE") {
                        if (msg.data) applyRemoteState(msg.data);
                    }
                } catch(e) { console.warn("Parse error:", e); }
            };
            
            socket.onerror = (err) => {
                console.error("WebSocket error:", err);
                updateConnectionStatus(false);
            };
            
            socket.onclose = () => {
                console.log("WebSocket closed, reconnecting in 3s...");
                updateConnectionStatus(false);
                setTimeout(connectWebSocket, 3000);
            };
        } catch(e) {
            console.error("Connection failed:", e);
            updateConnectionStatus(false);
            setTimeout(connectWebSocket, 5000);
        }
    }
    
    // Инициализация
    function init() {
        recalcTotal('home');
        recalcTotal('away');
        refreshUI();
        connectWebSocket();
        
        // Кнопки
        document.getElementById('homePlus1').onclick = () => addGoal('home', 1);
        document.getElementById('homeMinus1').onclick = () => addGoal('home', -1);
        document.getElementById('awayPlus1').onclick = () => addGoal('away', 1);
        document.getElementById('awayMinus1').onclick = () => addGoal('away', -1);
        document.getElementById('resetScores').onclick = resetAllScores;
        document.getElementById('periodPrev').onclick = () => setPeriod(matchState.period - 1);
        document.getElementById('periodNext').onclick = () => setPeriod(matchState.period + 1);
        document.getElementById('timeReset').onclick = setTimeToDefault;
        document.getElementById('timeSub10').onclick = () => adjustTime(-10);
        document.getElementById('timeAdd10').onclick = () => adjustTime(10);
        document.getElementById('timeSubMin').onclick = () => adjustTime(-60);
        document.getElementById('timeAddMin').onclick = () => adjustTime(60);
        
        // Периодический ping
        setInterval(() => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: "PING" }));
            }
        }, 25000);
    }
    
    init();
</script>
</body>
</html>
