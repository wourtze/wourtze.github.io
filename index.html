<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Кота Хоккей — Онлайн топ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏒 3 КОТА ХОККЕЙ 🐱</h1>
            <p class="subtitle">Хоккей с котами — онлайн топ игроков</p>
        </header>

        <div class="status-card">
            <div class="status-header">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Проверка сервера...</span>
            </div>
            <div class="server-info">
                <span>🌐 Сервер: </span>
                <span id="serverTime">--:--:--</span>
            </div>
        </div>

        <div class="top-section">
            <h2>🏆 ТОП ИГРОКОВ 🏆</h2>
            <div class="top-table">
                <div class="top-header">
                    <span class="rank">#</span>
                    <span class="name">ИГРОК</span>
                    <span class="score">ОЧКИ</span>
                </div>
                <div id="topList" class="top-list">
                    <div class="loading">Загрузка топа...</div>
                </div>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" id="refreshBtn">🔄 ОБНОВИТЬ ТОП</button>
            <button class="btn btn-secondary" id="addScoreBtn">⚡ ДОБАВИТЬ ТЕСТОВЫЕ ОЧКИ</button>
        </div>

        <div class="download-section">
            <p>Скачай игру и попади в топ!</p>
            <a href="#" class="btn btn-download">📥 СКАЧАТЬ ИГРУ (СКОРО)</a>
        </div>

        <footer>
            <p>3 Кота Хоккей — играй с друзьями, набирай очки, становись лучшим!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
