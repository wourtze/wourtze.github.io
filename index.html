        { word: "first", transcription: "/fɜːrst/", translate: "первый", icon: "fa-1", difficulty: "hard" },
        { word: "well", transcription: "/wel/", translate: "хорошо", icon: "fa-check-double", difficulty: "hard" },
        { word: "way", transcription: "/weɪ/", translate: "путь, способ", icon: "fa-road", difficulty: "hard" },
        { word: "even", transcription: "/ˈiːvən/", translate: "даже", icon: "fa-equals", difficulty: "hard" },
        { word: "new", transcription: "/njuː/", translate: "новый", icon: "fa-sparkles", difficulty: "hard" },
        { word: "want", transcription: "/wɒnt/", translate: "хотеть", icon: "fa-star", difficulty: "hard" },
        { word: "because", transcription: "/bɪˈkɒz/", translate: "потому что", icon: "fa-link", difficulty: "hard" },
        { word: "any", transcription: "/ˈeni/", translate: "любой", icon: "fa-cube", difficulty: "hard" },
        { word: "these", transcription: "/ðiːz/", translate: "эти", icon: "fa-layer-group", difficulty: "hard" },
        { word: "give", transcription: "/ɡɪv/", translate: "давать", icon: "fa-gift", difficulty: "hard" },
        { word: "day", transcription: "/deɪ/", translate: "день", icon: "fa-sun", difficulty: "hard" },
        { word: "most", transcription: "/məʊst/", translate: "большинство", icon: "fa-chart-pie", difficulty: "hard" },
        { word: "us", transcription: "/ʌs/", translate: "нам, нас", icon: "fa-users", difficulty: "hard" },
        { word: "man", transcription: "/mæn/", translate: "мужчина", icon: "fa-user", difficulty: "hard" },
        { word: "world", transcription: "/wɜːrld/", translate: "мир", icon: "fa-globe", difficulty: "hard" }
    ];

    const vocabularyDB = {
        all: allVocabulary,
        easy: allVocabulary.filter(w => w.difficulty === 'easy'),
        medium: allVocabulary.filter(w => w.difficulty === 'medium'),
        hard: allVocabulary.filter(w => w.difficulty === 'hard')
    };

    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let userScore = 0;
    let currentDifficulty = 'all';
    let currentVocabulary = vocabularyDB.all;
    let currentCardIndex = 0;

    // ========== АВТОРИЗАЦИЯ ==========
    const authTabs = document.querySelectorAll('.auth-tab');
    const authForms = {
        login: document.getElementById('loginForm'),
        register: document.getElementById('registerForm'),
        google: document.getElementById('googleForm')
    };

    authTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            authTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            Object.values(authForms).forEach(f => f.classList.remove('active'));
            authForms[tab.dataset.auth].classList.add('active');
        });
    });

    // Регистрация email/пароль
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await cred.user.updateProfile({ displayName: name });
            await db.collection('users').doc(cred.user.uid).set({
                name, email, score: 0,
                photoURL: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=4f46e5&color=fff`,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('Регистрация успешна!');
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    });

    // Вход email/пароль
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    });

    // Google вход
    document.getElementById('googleSignInBtn').addEventListener('click', async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;
            const doc = await db.collection('users').doc(user.uid).get();
            if (!doc.exists) {
                await db.collection('users').doc(user.uid).set({
                    name: user.displayName, email: user.email, score: 0,
                    photoURL: user.photoURL,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        } catch (e) {
            alert('Ошибка Google: ' + e.message);
        }
    });

    // Выход
    document.getElementById('signOutBtn').addEventListener('click', () => auth.signOut());

    // Обновление UI при авторизации
    auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        const authContainer = document.getElementById('authContainer');
        const userBar = document.getElementById('userBar');
        const leaderboard = document.getElementById('leaderboardSection');
        
        if (user) {
            authContainer.style.display = 'none';
            userBar.style.display = 'flex';
            leaderboard.style.display = 'block';
            
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                userScore = doc.data().score || 0;
                document.getElementById('userName').textContent = doc.data().name || user.displayName;
                document.getElementById('userScore').textContent = userScore;
                document.getElementById('userAvatar').src = doc.data().photoURL || user.photoURL || 'https://via.placeholder.com/40';
            }
            loadLeaderboard();
        } else {
            authContainer.style.display = 'block';
            userBar.style.display = 'none';
            leaderboard.style.display = 'none';
        }
    });

    // Добавление очков
    async function addScore(points) {
        if (!currentUser) { alert('Войдите, чтобы сохранять прогресс!'); return false; }
        userScore += points;
        await db.collection('users').doc(currentUser.uid).update({ score: userScore });
        document.getElementById('userScore').textContent = userScore;
        loadLeaderboard();
        return true;
    }

    // Таблица лидеров
    async function loadLeaderboard() {
        const list = document.getElementById('leaderboardList');
        const snap = await db.collection('users').orderBy('score', 'desc').limit(10).get();
        let html = '';
        let rank = 1;
        snap.forEach(doc => {
            const d = doc.data();
            let rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
            html += `<div class="leaderboard-item">
                <div class="leaderboard-rank ${rankClass}">${rank}</div>
                <img src="${d.photoURL || 'https://via.placeholder.com/35'}" style="width:35px;height:35px;border-radius:50%;">
                <span style="flex:1;">${d.name || 'Игрок'}</span>
                <span>${d.score || 0} очков</span>
            </div>`;
            rank++;
        });
        list.innerHTML = html || 'Нет игроков';
    }

    // ========== КАРТОЧКИ ==========
    function updateFlashcard() {
        const item = currentVocabulary[currentCardIndex];
        document.getElementById('flashIcon').className = `fas ${item.icon}`;
        document.getElementById('flashWord').textContent = item.word;
        document.getElementById('flashTrans').textContent = item.transcription;
        document.getElementById('flashTranslate').textContent = item.translate;
        document.getElementById('cardIndexDisplay').textContent = `${currentCardIndex+1}/${currentVocabulary.length}`;
    }

    document.getElementById('nextFlashBtn').addEventListener('click', async () => {
        if (currentUser) await addScore(5);
        currentCardIndex = (currentCardIndex + 1) % currentVocabulary.length;
        updateFlashcard();
    });

    document.getElementById('speakFlashBtn').addEventListener('click', () => {
        const u = new SpeechSynthesisUtterance(currentVocabulary[currentCardIndex].word);
        u.lang = 'en-US'; speechSynthesis.speak(u);
    });

    // Сложность
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDifficulty = btn.dataset.diff;
            currentVocabulary = vocabularyDB[currentDifficulty];
            currentCardIndex = 0;
            updateFlashcard();
            document.getElementById('currentDifficultyLabel').textContent = 
                {all:'Все слова', easy:'Легкий', medium:'Средний', hard:'Сложный'}[currentDifficulty];
        });
    });

    // Режимы
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active-panel'));
            document.getElementById(`panel-${btn.dataset.mode}`).classList.add('active-panel');
        });
    });

    // Игры (сокращено для brevity)
    document.querySelectorAll('.game-tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.game-tab').forEach(tb => tb.classList.remove('active'));
            t.classList.add('active');
            document.querySelectorAll('.game-pane').forEach(p => p.classList.remove('active'));
            document.getElementById(`game-${t.dataset.game}`).classList.add('active');
        });
    });

    // Quiz
    let quizItem, quizScore = 0, quizStreak = 0, quizAnswered = false;
    function genQuiz() {
        quizAnswered = false;
        quizItem = currentVocabulary[Math.floor(Math.random() * currentVocabulary.length)];
        document.getElementById('quizQuestion').textContent = `"${quizItem.word}" — перевод?`;
        let opts = [quizItem.translate];
        while(opts.length < 4) {
            const t = currentVocabulary[Math.floor(Math.random() * currentVocabulary.length)].translate;
            if(!opts.includes(t)) opts.push(t);
        }
        opts.sort(() => Math.random() - 0.5);
        const div = document.getElementById('quizOptions');
        div.innerHTML = '';
        opts.forEach(o => {
            const d = document.createElement('div'); d.className = 'quiz-option'; d.textContent = o;
            d.addEventListener('click', async () => {
                if(quizAnswered) return;
                quizAnswered = true;
                if(o === quizItem.translate) {
                    d.classList.add('correct'); quizScore++; quizStreak++;
                    if(currentUser) await addScore(10);
                } else {
                    d.classList.add('wrong'); quizStreak = 0;
                }
                document.getElementById('quizScore').textContent = quizScore;
                document.getElementById('quizStreak').textContent = quizStreak;
            });
            div.appendChild(d);
        });
    }
    document.getElementById('nextQuizBtn').addEventListener('click', genQuiz);

    // Инициализация
    updateFlashcard();
    genQuiz();
})();
</script>
</body>
</html>
