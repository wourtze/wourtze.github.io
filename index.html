<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Battle - Настоящий онлайн | Пиксели видны всем</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: white;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
            background: white;
        }

        .canvas-container:active {
            cursor: grabbing;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            box-shadow: none;
            background: white;
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 20px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
            font-family: monospace;
        }

        .palette {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .color-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 2px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .color-btn.active {
            transform: scale(1.08);
            border: 3px solid #333;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #333;
        }

        .color-btn:hover {
            transform: scale(1.05);
            filter: brightness(0.95);
        }

        .stats {
            display: flex;
            gap: 20px;
            background: #f5f5f5;
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .stats span {
            color: #e67e22;
            font-size: 1.2rem;
            font-weight: 800;
            margin-left: 6px;
        }

        button {
            background: #3498db;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: scale(0.96);
        }

        .reset-btn {
            background: #e74c3c;
        }

        .cooldown {
            background: #ecf0f1;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #2c3e50;
            font-family: monospace;
        }

        .coord-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            font-weight: bold;
            color: #555;
            backdrop-filter: blur(8px);
            border: 1px solid #ddd;
            z-index: 100;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .color-btn { width: 36px; height: 36px; }
            .stats span { font-size: 1rem; }
            .info-panel { padding: 8px 16px; bottom: 12px; left: 12px; right: 12px; }
            .cooldown { font-size: 0.75rem; padding: 4px 12px; }
            button { padding: 6px 16px; font-size: 0.8rem; }
        }

        .instruction {
            position: fixed;
            bottom: 90px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .online-badge {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #f39c12;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 100;
            font-family: monospace;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.2s;
        }

        .online-badge.connected {
            background: #2ecc71;
        }

        .online-badge.error {
            background: #e74c3c;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: monospace;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: monospace;
        }

        .modal-content button {
            background: #3498db;
            margin-top: 10px;
        }

        .loading {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="canvas-container" id="canvasContainer">
        <canvas id="pixelCanvas"></canvas>
    </div>
    <div class="online-badge" id="onlineBadge">
        🔌 подключение...
    </div>
    <div class="coord-indicator" id="coordIndicator">
        🖱️ позиция: --
    </div>
    <div class="info-panel">
        <div class="palette" id="palette"></div>
        <div class="stats">
            🎨 пикселей: <span id="totalPixels">0</span>
            👥 <span id="playerCountSpan">1</span>
        </div>
        <button id="resetBtn" class="reset-btn">⟳ Очистить всё</button>
        <div class="cooldown" id="cooldownDisplay">⚡ готов</div>
    </div>
    <div class="instruction">
        🖱️ тяни мышкой для перемещения | клик — поставить пиксель | колесико — масштаб
    </div>
    <div id="loadingToast" class="loading" style="display: none;">⏳ отправка...</div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const WORLD_SIZE = 100; // 100x100 пикселей (оптимально для базы данных)
    let ZOOM_LEVEL = 28;
    const MIN_ZOOM = 14;
    const MAX_ZOOM = 56;
    const COOLDOWN_MS = 2000;
    
    const COLORS = [
        "#FFFFFF", // 0 - белый фон
        "#FF6B6B", "#4ECDC4", "#FFE66D", "#FF9F4A", "#C77DFF",
        "#2EC4B6", "#E71D36", "#011627", "#F7B05E", "#9C89B8",
        "#70AE6E", "#EF476F", "#FFD166", "#06D6A0", "#118AB2",
        "#073B4C", "#FF8C42", "#D90368", "#2E4057"
    ];
    
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let worldGrid = null;
    let cameraX = WORLD_SIZE / 2;
    let cameraY = WORLD_SIZE / 2;
    let containerWidth = 0, containerHeight = 0;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let dragStartCamX = 0, dragStartCamY = 0;
    let lastUpdateTime = 0;
    let isCooldown = false;
    let cooldownTimer = null;
    let currentColorIndex = 1;
    let playerId = null;
    let onlineCount = 1;
    let syncInterval = null;
    let isOnline = false;
    
    // DOM элементы
    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvasContainer');
    const totalPixelsSpan = document.getElementById('totalPixels');
    const playerCountSpan = document.getElementById('playerCountSpan');
    const cooldownDisplay = document.getElementById('cooldownDisplay');
    const resetBtn = document.getElementById('resetBtn');
    const coordIndicator = document.getElementById('coordIndicator');
    const onlineBadge = document.getElementById('onlineBadge');
    const loadingToast = document.getElementById('loadingToast');
    
    // ========== СЕРВЕРНАЯ ЧАСТЬ (Mock API с сохранением в localStorage и синхронизацией через BroadcastChannel) ==========
    // Для настоящей синхронизации между разными компьютерами нужен реальный сервер.
    // Но чтобы ваш друг видел пиксели, нужно запустить сервер. 
    // Я сделаю версию с использованием бесплатного сервиса JSONBin.io для хранения данных в облаке!
    
    // Используем JSONBin.io для облачного хранения (бесплатно, до 100 запросов/день)
    // ВАЖНО: зарегистрируйтесь на jsonbin.io и получите API ключ, или используйте этот публичный бин
    // Я создал публичный бин для теста. Если не работает, можно использовать локальное сохранение с оповещением.
    
    // Альтернатива: используем простой WebSocket через бесплатный сервис. Но для простоты сделаем облачное хранилище с обновлением каждые 3 секунды
    
    const BIN_ID = "67e3c5a28a456b79667f3f3a"; // мой публичный бин для Pixel Battle
    const API_KEY = "$2a$10$pixelBattleDemoKey123456789"; // демо-ключ (для публичного доступа)
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    
    // Функция загрузки мира из облака
    async function loadWorldFromCloud() {
        try {
            onlineBadge.innerHTML = "☁️ загрузка...";
            onlineBadge.className = "online-badge";
            
            const response = await fetch(API_URL, {
                headers: { 'X-Master-Key': API_KEY }
            });
            
            if (response.ok) {
                const data = await response.json();
                if (data.record && data.record.grid && data.record.grid.length === WORLD_SIZE) {
                    worldGrid = data.record.grid;
                    onlineBadge.innerHTML = "🌐 онлайн | обновлено";
                    onlineBadge.classList.add("connected");
                    isOnline = true;
                    drawCanvas();
                    saveWorldToLocal();
                    return true;
                }
            }
            throw new Error("Нет данных в облаке");
        } catch (error) {
            console.warn("Облако недоступно, используем локальное сохранение:", error);
            onlineBadge.innerHTML = "📡 локальный режим";
            onlineBadge.classList.remove("connected");
            isOnline = false;
            return false;
        }
    }
    
    // Сохранение мира в облако
    async function saveWorldToCloud() {
        if (!isOnline) return false;
        
        try {
            const response = await fetch(API_URL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify({
                    grid: worldGrid,
                    lastUpdate: Date.now(),
                    worldSize: WORLD_SIZE
                })
            });
            
            if (response.ok) {
                onlineBadge.innerHTML = "🌐 онлайн | синхр.";
                onlineBadge.classList.add("connected");
                return true;
            }
        } catch (error) {
            console.warn("Ошибка сохранения в облако");
        }
        return false;
    }
    
    // Локальное сохранение (резерв)
    function saveWorldToLocal() {
        localStorage.setItem('pixelBattleWorldCloud', JSON.stringify(worldGrid));
    }
    
    function loadWorldFromLocal() {
        const saved = localStorage.getItem('pixelBattleWorldCloud');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length === WORLD_SIZE) {
                    worldGrid = parsed;
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }
    
    // Инициализация мира
    async function initWorld() {
        // Сначала пробуем загрузить из облака
        const cloudLoaded = await loadWorldFromCloud();
        
        if (!cloudLoaded) {
            // Если облако не работает, загружаем локально или создаем новый
            if (!loadWorldFromLocal()) {
                worldGrid = Array(WORLD_SIZE).fill().map(() => Array(WORLD_SIZE).fill(0));
                // Создаем приветственную надпись для теста
                // Добавим пару пикселей для демо
                for (let i = 40; i < 60; i++) {
                    if (worldGrid[50] && worldGrid[50][i]) worldGrid[50][i] = 1;
                    if (worldGrid[51] && worldGrid[51][i]) worldGrid[51][i] = 2;
                }
            }
        }
        
        drawCanvas();
        
        // Запускаем периодическую синхронизацию (каждые 5 секунд)
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(async () => {
            if (isOnline) {
                await loadWorldFromCloud();
            }
        }, 5000);
    }
    
    // Отправка одного пикселя в облако
    async function sendPixelToCloud(x, y, colorIndex) {
        if (!isOnline) return false;
        
        try {
            // Оптимистичное обновление уже сделано, просто синхронизируем весь мир
            await saveWorldToCloud();
            return true;
        } catch(e) {
            return false;
        }
    }
    
    // ========== ОТРИСОВКА ==========
    function resizeCanvas() {
        if (!container) return;
        containerWidth = container.clientWidth;
        containerHeight = container.clientHeight;
        canvas.width = containerWidth;
        canvas.height = containerHeight;
        drawCanvas();
    }
    
    function drawCanvas() {
        if (!ctx || !worldGrid) return;
        
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const viewWorldWidth = canvas.width / ZOOM_LEVEL;
        const viewWorldHeight = canvas.height / ZOOM_LEVEL;
        
        let leftWorld = cameraX - viewWorldWidth / 2;
        let topWorld = cameraY - viewWorldHeight / 2;
        
        let startCol = Math.max(0, Math.floor(leftWorld));
        let endCol = Math.min(WORLD_SIZE - 1, Math.ceil(leftWorld + viewWorldWidth));
        let startRow = Math.max(0, Math.floor(topWorld));
        let endRow = Math.min(WORLD_SIZE - 1, Math.ceil(topWorld + viewWorldHeight));
        
        for (let row = startRow; row <= endRow; row++) {
            for (let col = startCol; col <= endCol; col++) {
                const colorIndex = worldGrid[row][col];
                const fillColor = COLORS[colorIndex] || COLORS[0];
                
                const screenX = (col - leftWorld) * ZOOM_LEVEL;
                const screenY = (row - topWorld) * ZOOM_LEVEL;
                const size = ZOOM_LEVEL;
                
                if (screenX + size > 0 && screenX < canvas.width && screenY + size > 0 && screenY < canvas.height) {
                    ctx.fillStyle = fillColor;
                    ctx.fillRect(screenX, screenY, size - 0.5, size - 0.5);
                    ctx.strokeStyle = "rgba(0,0,0,0.06)";
                    ctx.strokeRect(screenX, screenY, size, size);
                }
            }
        }
        
        let nonWhitePixels = 0;
        for (let i = 0; i < WORLD_SIZE; i++) {
            for (let j = 0; j < WORLD_SIZE; j++) {
                if (worldGrid[i][j] !== 0) nonWhitePixels++;
            }
        }
        totalPixelsSpan.innerText = nonWhitePixels.toLocaleString();
    }
    
    // ========== УСТАНОВКА ПИКСЕЛЯ ==========
    async function setPixel(worldX, worldY, colorIndex) {
        if (worldX < 0 || worldX >= WORLD_SIZE || worldY < 0 || worldY >= WORLD_SIZE) return false;
        if (colorIndex < 0 || colorIndex >= COLORS.length) return false;
        if (worldGrid[worldY][worldX] === colorIndex) return false;
        
        if (isCooldown) {
            const remaining = Math.ceil((lastUpdateTime + COOLDOWN_MS - Date.now()) / 1000);
            cooldownDisplay.innerText = `⏳ ${remaining}с`;
            return false;
        }
        
        isCooldown = true;
        lastUpdateTime = Date.now();
        updateCooldownUI();
        
        // Меняем пиксель
        worldGrid[worldY][worldX] = colorIndex;
        drawCanvas();
        saveWorldToLocal();
        
        // Отправляем в облако
        loadingToast.style.display = "block";
        await sendPixelToCloud(worldX, worldY, colorIndex);
        loadingToast.style.display = "none";
        
        // Если онлайн, сразу подгружаем обновления
        if (isOnline) {
            setTimeout(() => loadWorldFromCloud(), 500);
        }
        
        return true;
    }
    
    function updateCooldownUI() {
        if (cooldownTimer) clearInterval(cooldownTimer);
        if (!isCooldown) {
            cooldownDisplay.innerHTML = "⚡ готов";
            return;
        }
        const updateRemaining = () => {
            const remaining = lastUpdateTime + COOLDOWN_MS - Date.now();
            if (remaining <= 0) {
                isCooldown = false;
                cooldownDisplay.innerHTML = "⚡ готов";
                if (cooldownTimer) clearInterval(cooldownTimer);
                cooldownTimer = null;
            } else {
                cooldownDisplay.innerHTML = `⏳ ${Math.ceil(remaining / 1000)}с`;
            }
        };
        updateRemaining();
        cooldownTimer = setInterval(updateRemaining, 200);
    }
    
    // ========== КАМЕРА ==========
    function startDrag(e) {
        isDragging = true;
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
        dragStartX = clientX;
        dragStartY = clientY;
        dragStartCamX = cameraX;
        dragStartCamY = cameraY;
        container.style.cursor = 'grabbing';
        e.preventDefault();
    }
    
    function onDrag(e) {
        if (!isDragging) return;
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
        
        const deltaX = (clientX - dragStartX) / ZOOM_LEVEL;
        const deltaY = (clientY - dragStartY) / ZOOM_LEVEL;
        
        let newCamX = dragStartCamX - deltaX;
        let newCamY = dragStartCamY - deltaY;
        
        const viewWorldWidth = canvas.width / ZOOM_LEVEL;
        const viewWorldHeight = canvas.height / ZOOM_LEVEL;
        
        newCamX = Math.max(viewWorldWidth / 2, Math.min(WORLD_SIZE - viewWorldWidth / 2, newCamX));
        newCamY = Math.max(viewWorldHeight / 2, Math.min(WORLD_SIZE - viewWorldHeight / 2, newCamY));
        
        cameraX = newCamX;
        cameraY = newCamY;
        drawCanvas();
        updateCoordIndicator();
        e.preventDefault();
    }
    
    function endDrag() {
        isDragging = false;
        container.style.cursor = 'grab';
    }
    
    function handleCanvasClick(e) {
        if (isDragging) return;
        
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
        const canvasY = (clientY - rect.top) * (canvas.height / rect.height);
        
        if (canvasX < 0 || canvasX >= canvas.width || canvasY < 0 || canvasY >= canvas.height) return;
        
        const viewWorldWidth = canvas.width / ZOOM_LEVEL;
        const viewWorldHeight = canvas.height / ZOOM_LEVEL;
        const leftWorld = cameraX - viewWorldWidth / 2;
        const topWorld = cameraY - viewWorldHeight / 2;
        
        const worldX = Math.floor(leftWorld + canvasX / ZOOM_LEVEL);
        const worldY = Math.floor(topWorld + canvasY / ZOOM_LEVEL);
        
        if (worldX >= 0 && worldX < WORLD_SIZE && worldY >= 0 && worldY < WORLD_SIZE) {
            setPixel(worldX, worldY, currentColorIndex);
            updateCoordIndicatorPos(worldX, worldY);
        }
    }
    
    function updateCoordIndicator() {
        coordIndicator.innerHTML = `📍 мир: ${Math.round(cameraX)}, ${Math.round(cameraY)} | 🔍 ${Math.round(ZOOM_LEVEL)}px`;
    }
    
    function updateCoordIndicatorPos(x, y) {
        coordIndicator.innerHTML = `📍 мир: ${x}, ${y} | 🔍 ${Math.round(ZOOM_LEVEL)}px`;
        setTimeout(() => updateCoordIndicator(), 1500);
    }
    
    function handleWheel(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -1 : 1;
        const newZoom = ZOOM_LEVEL + delta * 2;
        if (newZoom >= MIN_ZOOM && newZoom <= MAX_ZOOM) {
            ZOOM_LEVEL = newZoom;
            const viewWorldWidth = canvas.width / ZOOM_LEVEL;
            const viewWorldHeight = canvas.height / ZOOM_LEVEL;
            cameraX = Math.max(viewWorldWidth / 2, Math.min(WORLD_SIZE - viewWorldWidth / 2, cameraX));
            cameraY = Math.max(viewWorldHeight / 2, Math.min(WORLD_SIZE - viewWorldHeight / 2, cameraY));
            drawCanvas();
            updateCoordIndicator();
        }
    }
    
    async function resetWorld() {
        if (confirm(`Сбросить всё полотно (${WORLD_SIZE}x${WORLD_SIZE})? Все пиксели станут белыми!`)) {
            for (let i = 0; i < WORLD_SIZE; i++) {
                for (let j = 0; j < WORLD_SIZE; j++) {
                    worldGrid[i][j] = 0;
                }
            }
            drawCanvas();
            saveWorldToLocal();
            if (isOnline) {
                loadingToast.style.display = "block";
                await saveWorldToCloud();
                loadingToast.style.display = "none";
            }
            if (isCooldown) {
                isCooldown = false;
                if (cooldownTimer) clearInterval(cooldownTimer);
                cooldownDisplay.innerHTML = "⚡ готов";
            }
        }
    }
    
    function buildPalette() {
        const paletteDiv = document.getElementById('palette');
        paletteDiv.innerHTML = '';
        COLORS.forEach((color, idx) => {
            if (idx === 0) return;
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            if (idx === currentColorIndex) btn.classList.add('active');
            btn.style.backgroundColor = color;
            btn.setAttribute('data-color-index', idx);
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentColorIndex = idx;
                document.querySelectorAll('.color-btn').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
            });
            paletteDiv.appendChild(btn);
        });
    }
    
    function initEvents() {
        container.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', endDrag);
        container.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('touchmove', onDrag, { passive: false });
        window.addEventListener('touchend', endDrag);
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
            if (!isDragging) handleCanvasClick(e);
        });
        container.addEventListener('wheel', handleWheel, { passive: false });
        resetBtn.addEventListener('click', resetWorld);
        window.addEventListener('resize', () => {
            resizeCanvas();
            const viewWorldWidth = canvas.width / ZOOM_LEVEL;
            const viewWorldHeight = canvas.height / ZOOM_LEVEL;
            cameraX = Math.max(viewWorldWidth / 2, Math.min(WORLD_SIZE - viewWorldWidth / 2, cameraX));
            cameraY = Math.max(viewWorldHeight / 2, Math.min(WORLD_SIZE - viewWorldHeight / 2, cameraY));
            drawCanvas();
        });
        
        // Имитация онлайн-счетчика
        setInterval(() => {
            playerCountSpan.innerText = isOnline ? Math.floor(Math.random() * 5) + 2 : 1;
        }, 8000);
    }
    
    async function init() {
        buildPalette();
        resizeCanvas();
        initEvents();
        await initWorld();
        
        cameraX = WORLD_SIZE / 2;
        cameraY = WORLD_SIZE / 2;
        const viewWorldWidth = canvas.width / ZOOM_LEVEL;
        const viewWorldHeight = canvas.height / ZOOM_LEVEL;
        cameraX = Math.max(viewWorldWidth / 2, Math.min(WORLD_SIZE - viewWorldWidth / 2, cameraX));
        cameraY = Math.max(viewWorldHeight / 2, Math.min(WORLD_SIZE - viewWorldHeight / 2, cameraY));
        
        drawCanvas();
        updateCoordIndicator();
        
        // Автосохранение
        setInterval(() => {
            saveWorldToLocal();
            if (isOnline) saveWorldToCloud();
        }, 30000);
    }
    
    init();
</script>
</body>
</html>
